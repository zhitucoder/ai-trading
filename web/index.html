<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">AI<span>Trade</span></div>
        <nav>
            <a v-for="p in navPages" :key="p.id"
               :class="{ active: currentPage === p.id }"
               @click="currentPage = p.id">
                <span class="icon">{{ p.icon }}</span>
                {{ p.label }}
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="main">
        <screening-page v-if="currentPage === 'screening'"></screening-page>
        <vcp-page v-else-if="currentPage === 'vcp'"></vcp-page>
        <bt-strategies-page v-else-if="currentPage === 'bt_strategies'"></bt-strategies-page>
        <position-bt-page v-else-if="currentPage === 'position_bt'"></position-bt-page>
        <ma-bt-page v-else-if="currentPage === 'ma_bt'"></ma-bt-page>
        <quant-breakout-bt-page v-else-if="currentPage === 'quant_breakout_bt'"></quant-breakout-bt-page>
        <profile-page v-else-if="currentPage === 'profile'"></profile-page>
        <debate-page v-else-if="currentPage === 'debate'"></debate-page>
        <expert-page v-else-if="currentPage === 'expert'"></expert-page>
        <query-page v-else-if="currentPage === 'query'"></query-page>
        <data-mgmt-page v-else-if="currentPage === 'data_mgmt'"></data-mgmt-page>
        <strong-page v-else-if="currentPage === 'strong'"></strong-page>
        <strong-stocks-page v-else-if="currentPage === 'strong_stocks'"></strong-stocks-page>
        <placeholder-page v-else :page="pages.find(p => p.id === currentPage)"></placeholder-page>
    </div>
</div>

<template id="bt-strategies-tpl">
    <div class="topbar">
        <h2>回测策略</h2>
        <span class="badge">历史信号验证</span>
    </div>
    <div class="content">
        <div class="card" style="cursor:pointer;" @click="$root.currentPage = 'position_bt'">
            <div class="card-title">
                <span style="font-size:24px;margin-right:10px;">⟳</span> 建仓回测
                <span class="hint">自定义买卖交易 → 计算持仓盈亏、最大回撤</span>
            </div>
            <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">
                支持逐笔买卖交易，自动匹配交易日，基于均价成本法计算逐日盈亏。
            </div>
        </div>
        <div class="card" style="cursor:pointer;" @click="$root.currentPage = 'ma_bt'">
            <div class="card-title">
                <span style="font-size:24px;margin-right:10px;">∿</span> 均线回测
                <span class="hint">金叉买入/死叉卖出 → 胜率/收益/回撤</span>
            </div>
            <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">
                短均线上穿长均线买入，下穿卖出；支持任意周期组合，计算交易明细和策略指标。
            </div>
        </div>
        <div class="card" style="cursor:pointer;" @click="$root.currentPage = 'quant_breakout_bt'">
            <div class="card-title">
                <span style="font-size:24px;margin-right:10px;">↗</span> 底部突破回测
                <span class="hint">横盘整理N日 + 大阳线突破 → 历史信号验证</span>
            </div>
            <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">
                条件：N日内每日涨跌幅 ≤ ±4%，箱体振幅 ≤ 12%，今日涨幅 ≥ 7%。回测指定股票所有历史信号。
            </div>
        </div>
    </div>
</template>

<!-- Screening Template -->
<template id="screening-tpl">
    <div class="topbar">
        <h2>选股策略</h2>
        <span class="badge">智能筛选</span>
    </div>
    <div class="content">
        <!-- Error -->
        <div class="card" v-if="error" style="border-color:var(--red);color:var(--red);font-size:13px;">
            {{ error }}
        </div>

        <!-- Strategy Tabs -->
        <div class="strategy-tabs">
            <button class="strategy-tab" :class="{ active: tabType === 'technical' }"
                    @click="tabType = 'technical'; selectedStrategy = null; result = null">技术指标</button>
            <button class="strategy-tab" :class="{ active: tabType === 'fundamental' }"
                    @click="tabType = 'fundamental'; selectedStrategy = null; result = null">基本面指标</button>
            <button class="strategy-tab" :class="{ active: tabType === 'combined' }"
                    @click="tabType = 'combined'; selectedStrategy = null; result = null">组合筛选</button>
            <button class="strategy-tab tab-minervini" :class="{ active: tabType === 'minervini' }"
                    @click="tabType = 'minervini'; selectedStrategy = null; result = null"
                    style="color:var(--amber);">⚡ Minervini</button>
            <button class="strategy-tab" :class="{ active: tabType === 'turnaround' }"
                    @click="switchToTurnaround"
                    style="color:var(--green);">↺ 困境反转</button>
        </div>

        <div v-if="tabType === 'minervini'" class="card" style="border-color:var(--amber);font-size:13px;line-height:1.7;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <span style="font-size:20px;">⚡</span>
                <strong style="color:var(--amber);">Mark Minervini · SEPA 选股法</strong>
            </div>
            <p style="color:var(--text-muted);">
                <strong style="color:var(--text);">SEPA（Specific Entry Point Analysis）</strong> = 基本面 + 技术面双优筛选。
                Minervini 的「趋势模板」要求：EPS/营收增长 > 25%、ROE > 17%、
                价格在 MA50/MA150 上方、距 52 周高点的 75% 以内、近期波幅收敛、成交量放大确认。<br>
                <span style="color:var(--text-dim);font-size:12px;">参考: 《超级绩效》《股票魔法师》</span>
            </p>
        </div>

        <div v-if="tabType === 'turnaround'" class="card" style="border-color:var(--green);font-size:13px;line-height:1.7;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <span style="font-size:20px;">↺</span>
                <strong style="color:var(--green);">困境反转策略</strong>
            </div>
            <p style="color:var(--text-muted);">
                筛选逻辑：<strong style="color:var(--text);">前期营收下滑 → 当前恢复增长</strong> 或 <strong style="color:var(--text);">亏损转盈利</strong>，
                且股价在 MA200 附近（偏离 ≤ 20%）。<br>
                <strong>营收反转</strong>：前一年营收增速 &lt; -10% → 当前 &gt; 15% 且盈利<br>
                <strong>扭亏为盈</strong>：前一年亏损 → 当前净利润 &gt; 1000万 且营收增长 &gt; 10%<br>
                <span style="color:var(--text-dim);font-size:12px;">排除 ST / *ST / 退市</span>
            </p>
        </div>

        <!-- Strategy Cards -->
        <div class="card" v-for="s in currentStrategies" :key="s.id"
             v-show="tabType !== 'fundamental' || s.id === 'fundamental_all'"
             :style="{ borderColor: isSelected(s.id) ? 'var(--accent)' : '' }">
            <div class="card-title">
                {{ s.name }}
                <span class="hint">{{ s.description }}</span>
            </div>
            <div v-if="tabType === 'technical' && s.id === 'ma_bullish'" class="config-grid">
                <div class="config-item">
                    <label>均线周期（逗号分隔）</label>
                    <input v-model="maPeriods" placeholder="5,10,20,60">
                </div>
            </div>
            <div v-if="tabType === 'technical' && s.id === 'quantitative_breakout'" class="config-grid">
                <div class="config-item">
                    <label>横盘观察天数 (N)</label>
                    <input v-model.number="consolidationDays" type="number" min="5" max="120">
                    <span class="hint">默认 20 天</span>
                </div>
                <div class="config-item">
                    <span class="hint" style="font-size:12px;color:var(--text-dim);">
                        条件①：N日内每日涨跌幅 ≤ ±4%，箱体振幅 ≤ 12%<br>
                        条件②：今日大阳线突破，涨幅 ≥ 7%
                    </span>
                </div>
            </div>
            <div v-if="tabType === 'fundamental' && s.id === 'fundamental_all'" class="config-grid">
                <div class="config-item">
                    <label>营收增长率下限 (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                </div>
                <div class="config-item">
                    <label>净利润增长率下限 (%)</label>
                    <input v-model.number="profitThreshold" type="number" step="1">
                </div>
                <div class="config-item">
                    <label>资产负债率上限 (%)</label>
                    <input v-model.number="debtThreshold" type="number" step="1">
                </div>
            </div>
            <div v-if="tabType === 'combined' && s.id === 'ma_bullish_and_revenue_growth'" class="config-grid">
                <div class="config-item">
                    <label>均线周期（逗号分隔）</label>
                    <input v-model="maPeriods" placeholder="5,10,20,60">
                </div>
                <div class="config-item">
                    <label>营收增长率下限 (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                </div>
            </div>
            <div v-if="tabType === 'minervini' && s.id === 'sepa_master'" class="config-grid">
                <div class="config-item">
                    <label>Minervini: 净利润增长率 ≥ (%)</label>
                    <input v-model.number="profitThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 25%+</span>
                </div>
                <div class="config-item">
                    <label>Minervini: 营收增长率 ≥ (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 25%+</span>
                </div>
                <div class="config-item">
                    <label>Minervini: ROE ≥ (%)</label>
                    <input v-model.number="debtThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 17%+</span>
                </div>
            </div>
            <div v-if="tabType === 'minervini' && s.id === 'minervini_trend_template'" class="config-grid">
                <div class="config-item">
                    <label>距52周高点 ≥ (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 75%+</span>
                </div>
                <div class="config-item">
                    <label>价格紧凑观察期 (天)</label>
                    <input v-model.number="profitThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 15-30天</span>
                </div>
            </div>
            <div v-if="tabType === 'turnaround' && s.id === 'turnaround'" class="config-grid">
                <div class="config-item">
                    <label>当前营收增速 ≥ (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                    <span class="hint">默认: 15%</span>
                </div>
                <div class="config-item">
                    <label>前期营收下滑 ≤ (%) / 净利润下限(百万元)</label>
                    <input v-model.number="profitThreshold" type="number" step="1">
                    <span class="hint">默认: 10 (下滑上限+净利润下限)</span>
                </div>
                <div class="config-item">
                    <label>偏离MA200 ≤ (%)</label>
                    <input v-model.number="debtThreshold" type="number" step="1">
                    <span class="hint">默认: 20%</span>
                </div>
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-primary" @click="selectStrategy(s.id)" :disabled="isSelected(s.id)">
                    {{ isSelected(s.id) ? '✓ 已选择' : '选择此策略' }}
                </button>
            </div>
        </div>

        <!-- Execute -->
        <div v-if="selectedStrategy" class="card" style="display:flex;align-items:center;gap:16px;">
            <span style="font-size:13px;color:var(--text-muted);">
                已选策略: <strong style="color:var(--accent);">{{ currentStrategies.find(s=>s.id===selectedStrategy)?.name || selectedStrategy }}</strong>
            </span>
            <button class="btn btn-primary" @click="execute" :disabled="loading">
                <span v-if="loading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                {{ loading ? '筛选中...' : '▶ 执行筛选' }}
            </button>
        </div>

        <!-- Results -->
        <div v-if="result" class="card">
            <div class="result-bar">
                <span class="count">共筛选出 <strong>{{ result.total }}</strong> 只股票</span>
            </div>
            <div class="table-wrap" v-if="result.rows && result.rows.length">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:40px;">#</th>
                                    <th style="width:80px;">代码</th>
                                    <th style="width:90px;">名称</th>
                                    <th v-for="col in result.columns" :key="col">
                                        <template v-if="col === 'close_price'">最新价</template>
                                        <template v-else-if="col === 'report_date'">报告期</template>
                                        <template v-else-if="col === 'latest_date'">最新日</template>
                                        <template v-else-if="col === 'revenue_growth_rate'">营收增长率</template>
                                        <template v-else-if="col === 'net_profit_growth_rate'">净利润增长率</template>
                                        <template v-else-if="col === 'debt_ratio'">资产负债率</template>
                                        <template v-else-if="col === 'roe'">ROE</template>
                                        <template v-else-if="col === 'q_revenue'">单季营业收入</template>
                                        <template v-else-if="col === 'q_parent_net_profit'">单季归母净利润</template>
                                        <template v-else-if="col === 'latest_price'">最新价</template>
                                        <template v-else-if="col === 'pct_52w_high'">距52周高</template>
                                        <template v-else-if="col === 'ma50'">MA50</template>
                                        <template v-else-if="col === 'ma150'">MA150</template>
                                        <template v-else-if="col === 'tightness'">波幅</template>
                                        <template v-else-if="col === 'volume_ratio'">量比</template>
                                        <template v-else-if="col === 'cur_rev_growth'">现营收增速</template>
                                        <template v-else-if="col === 'prev_rev_growth'">前营收增速</template>
                                        <template v-else-if="col === 'cur_profit_growth'">现净利润增速</template>
                                        <template v-else-if="col === 'cur_profit'">现净利润</template>
                                        <template v-else-if="col === 'prev_profit'">前净利润</template>
                                        <template v-else-if="col === 'operating_revenue'">营业收入</template>
                                        <template v-else-if="col === 'ma200'">MA200</template>
                                        <template v-else-if="col === 'ma200_deviation_pct'">偏离MA200</template>
                                        <template v-else-if="col === 'breakout_price'">突破价</template>
                                        <template v-else-if="col === 'breakout_pct'">突破涨幅</template>
                                        <template v-else-if="col === 'range_pct'">箱体振幅</template>
                                        <template v-else-if="col === 'breakout_date'">突破日期</template>
                                        <template v-else>{{ col }}</template>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="(row, i) in result.rows" :key="i">
                                    <td>{{ i + 1 }}</td>
                                    <td><strong>{{ row.stock_code }}</strong></td>
                                    <td>{{ row.stock_name }}</td>
                                    <td v-for="col in result.columns" :key="col" :class="valClass(row[col])">
                                        <template v-if="col === 'close_price' || col === 'ma50' || col === 'ma150' || col === 'latest_price'">
                                            {{ fmt(row[col]) }}
                                        </template>
                                        <template v-else-if="col.startsWith('ma') && col !== 'ma50' && col !== 'ma150'">
                                            {{ fmt(row[col]) }}
                                        </template>
                                        <template v-else-if="col.includes('growth') || col.includes('ratio')">
                                            {{ fmtGrowth(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'roe'">
                                            {{ fmtGrowth(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'pct_52w_high'">
                                            {{ row[col] != null ? Number(row[col]).toFixed(1) + '%' : '-' }}
                                        </template>
                                        <template v-else-if="col === 'tightness'">
                                            {{ row[col] != null ? Number(row[col]).toFixed(2) + '%' : '-' }}
                                        </template>
                                        <template v-else-if="col === 'volume_ratio'">
                                            {{ row[col] != null ? Number(row[col]).toFixed(2) + 'x' : '-' }}
                                        </template>
                                        <template v-else-if="col === 'q_revenue' || col === 'q_parent_net_profit'">
                                            {{ fmtMoney(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'report_date' || col === 'latest_date'">
                                            {{ row[col] ? String(row[col]).substring(0, 10) : '' }}
                                        </template>
                                        <template v-else-if="col === 'cur_profit' || col === 'prev_profit' || col === 'operating_revenue'">
                                            {{ fmtMoney(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'cur_rev_growth' || col === 'prev_rev_growth' || col === 'cur_profit_growth'">
                                            {{ fmtGrowth(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'ma200'">
                                            {{ fmt(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'ma200_deviation_pct'">
                                            {{ row[col] != null ? Number(row[col]).toFixed(1) + '%' : '-' }}
                                        </template>
                                        <template v-else-if="col === 'breakout_price'">
                                            {{ fmt(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'breakout_pct'">
                                            {{ row[col] != null ? fmtGrowth(row[col]) : '-' }}
                                        </template>
                                        <template v-else-if="col === 'range_pct'">
                                            {{ row[col] != null ? Number(row[col]).toFixed(2) + '%' : '-' }}
                                        </template>
                                        <template v-else-if="col === 'breakout_date'">
                                            {{ row[col] ? String(row[col]).substring(0, 10) : '' }}
                                        </template>
                                        <template v-else>
                                            {{ row[col] ?? '-' }}
                                        </template>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
            </div>
            <div v-else class="placeholder" style="height:100px;">
                <p style="font-size:13px;color:var(--text-muted);">没有符合条件的股票</p>
            </div>
        </div>
    </div>
</template>

<!-- ── Position Backtest Template ── -->
<template id="position-bt-tpl">
    <div class="topbar">
        <h2>建仓回测</h2>
        <span class="badge">交互式</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="form-row">
                <div class="config-item" style="min-width:100px;">
                    <label>股票代码</label>
                    <input v-model="stockCode" placeholder="600519" @keyup.enter="loadKline">
                </div>
                <div class="config-item" style="min-width:100px;">
                    <label>K线天数</label>
                    <input v-model.number="klineDays" type="number" min="60" max="2000">
                </div>
                <div class="config-item" style="min-width:100px;">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" @click="loadKline" :disabled="klineLoading">
                        {{ klineLoading ? '加载中...' : '加载K线' }}
                    </button>
                </div>
                <div v-if="stockName" class="config-item" style="justify-content:flex-end;">
                    <span style="font-size:16px;font-weight:700;color:var(--accent);">{{ stockCode }} {{ stockName }}</span>
                </div>
            </div>
        </div>

        <div v-if="chartData.length" class="trade-toggle">
            <button class="toggle-btn buy" :class="{ active: tradeDirection === 'buy' }" @click="tradeDirection='buy'">▲ 买入</button>
            <button class="toggle-btn sell" :class="{ active: tradeDirection === 'sell' }" @click="tradeDirection='sell'">▼ 卖出</button>
            <span style="font-size:12px;color:var(--text-muted);margin-left:12px;line-height:34px;">点击K线柱添加交易记录（每手100股）</span>
        </div>

        <div v-if="chartData.length" class="chart-box" ref="chartRef"></div>

        <div v-if="trades.length" class="card">
            <div class="card-title">交易记录 ({{ trades.length }})</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>日期</th><th>方向</th><th>股数</th><th>价格</th><th>金额</th><th>操作</th></tr></thead>
                    <tbody>
                        <tr v-for="(t, i) in trades" :key="i">
                            <td>{{ t.date }}</td>
                            <td><span :style="{color:t.direction==='buy'? 'var(--red)':'var(--green)'}">{{ t.direction==='buy' ? '买入' : '卖出' }}</span></td>
                            <td>{{ t.shares }}</td>
                            <td>{{ fmt(t.price) }}</td>
                            <td>{{ fmt(t.shares * t.price) }}</td>
                            <td><button class="btn-delete" @click="deleteTrade(i)">删除</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div v-if="trades.length" style="margin-top:12px;">
                <button class="btn btn-primary" @click="runPositionBt" :disabled="btLoading">
                    {{ btLoading ? '计算中...' : '▶ 计算回测结果' }}
                </button>
            </div>
        </div>

        <div v-if="btResult.summary && Object.keys(btResult.summary).length" class="card">
            <div class="card-title">持仓汇总</div>
            <div class="summary-grid">
                <div class="summary-item"><div class="label">已投入总金额</div><div class="value accent">{{ fmtMoney(btResult.summary.total_invested) }}</div></div>
                <div class="summary-item"><div class="label">当前持仓市值</div><div class="value accent">{{ fmtMoney(btResult.summary.final_market_value) }}</div></div>
                <div class="summary-item"><div class="label">已卖出金额</div><div class="value accent">{{ fmtMoney(btResult.summary.total_sold_value) }}</div></div>

<template id="quant-breakout-bt-tpl">

                    </div>

        <!-- ══════ Tab2: 画像筛选 ══════ -->

                    <div class="screening-section-title">阶段</div>
                    <div class="screening-stage-group">

                </div>

                <div class="screening-section">
                    <div class="screening-section-title">评分</div>

                        <span>技术评分 ≥</span>

                    </div>
                    <div class="screening-slider-row">
                        <span>基本面评分 ≥</span>
                        <input type="range" min="0" max="100" v-model.number="filterFundScore" @input="onFilterChange">

                </div>

                <div class="screening-section">
                    <div class="screening-section-title">增长率 & 负债率</div>

                        <div><label>净利润增长率 ≥</label><input type="number" v-model.number="filterProfitGrowth" @input="onFilterChange" style="width:80px;" placeholder="%"></div>

                        <div><label>连续两年毛利率同比 ≥</label><input type="number" v-model.number="filterGmGrowth2y" @input="onFilterChange" style="width:80px;" placeholder="%"></div>

                </div>

                <div class="screening-actions">
                    <button class="btn btn-primary" @click="doSearch" :disabled="searchLoading">
                        {{ searchLoading ? '搜索中...' : '▶ 执行筛选' }}
                    </button>
                    <span v-if="searchResult" class="screening-count">共 <strong>{{ searchResult.total }}</strong> 只</span>
                    <button v-if="searchResult" class="btn btn-outline btn-sm" @click="resetFilters" style="margin-left:8px;">重置</button>
                </div>
            </div>

            <div v-if="searchLoading" class="loading"><div class="spinner"></div><span>搜索中...</span></div>

            <div v-if="searchResult && searchResult.rows.length" class="card">

                    <table>
                        <thead>
                            <tr>
                                <th style="width:36px;">#</th>
                                <th style="width:80px;">代码</th>
                                <th style="width:80px;">名称</th>
                                <th style="width:80px;">价格</th>
                                <th style="width:60px;cursor:pointer;" @click="toggleSort('price_change_pct')">涨幅{{ sortArrow('price_change_pct') }}</th>
                                <th style="width:80px;">阶段</th>
                                <th style="width:60px;cursor:pointer;" @click="toggleSort('tech_score')">技术{{ sortArrow('tech_score') }}</th>
                                <th style="width:60px;cursor:pointer;" @click="toggleSort('fund_score')">基本{{ sortArrow('fund_score') }}</th>
                                <th style="width:80px;cursor:pointer;" @click="toggleSort('revenue_growth')">营收增长{{ sortArrow('revenue_growth') }}</th>
                                <th style="width:80px;cursor:pointer;" @click="toggleSort('net_profit_growth')">利润增长{{ sortArrow('net_profit_growth') }}</th>
                                <th style="width:90px;cursor:pointer;" @click="toggleSort('contract_liab_to_assets')">合同负债{{ sortArrow('contract_liab_to_assets') }}</th>

                            </tr>
                        </thead>

                                class="screening-row" @click="goToProfile(row.stock_code)">
                                <td>{{ (searchResult.page - 1) * searchResult.page_size + i + 1 }}</td>
                                <td><strong>{{ row.stock_code }}</strong></td>
                                <td>{{ row.stock_name }}</td>
                                <td>{{ fmt(row.latest_price) }}</td>
                                <td :class="valClass(row.price_change_pct)">{{ fmtGrowth(row.price_change_pct) }}</td>
                                <td><span :class="'stage-badge stage-' + (row.stage_id || '').replace('stage.', '')">{{ row.stage_name }}</span></td>
                                <td :class="scoreTextClass(row.tech_score)">{{ row.tech_score }}</td>
                                <td :class="scoreTextClass(row.fund_score)">{{ row.fund_score }}</td>
                                <td :class="valClass(row.revenue_growth)">{{ row.revenue_growth != null ? fmtGrowth(row.revenue_growth) : '-' }}</td>
                                <td :class="valClass(row.net_profit_growth)">{{ row.net_profit_growth != null ? fmtGrowth(row.net_profit_growth) : '-' }}</td>
                                <td :class="valClass(10 - parseFloat(row.contract_liab_to_assets))">{{ row.contract_liab_to_assets != null ? parseFloat(row.contract_liab_to_assets).toFixed(2) + '%' : '-' }}</td>
                                <td style="text-align:left;">
                                    <span v-for="t in (row.active_tags || []).slice(0, 4)" :key="t.id" class="screening-tag">{{ t.name }}</span>
                                    <span v-if="(row.active_tags || []).length > 4" class="screening-tag-more">+{{ row.active_tags.length - 4 }}</span>
                                </td>

                        </tbody>
                    </table>
                </div>
                <div class="pagination" v-if="searchResult.total > searchResult.page_size">
                    <button class="page-btn" :disabled="searchResult.page <= 1" @click="searchResult.page--; doSearch()">‹</button>
                    <span class="page-info">{{ searchResult.page }} / {{ Math.ceil(searchResult.total / searchResult.page_size) }}</span>
                    <button class="page-btn" :disabled="searchResult.page * searchResult.page_size >= searchResult.total" @click="searchResult.page++; doSearch()">›</button>
                </div>
            </div>

            <div v-else-if="searchResult && !searchResult.rows.length" class="card">
                <div class="placeholder" style="height:100px;">
                    <p style="font-size:13px;color:var(--text-muted);">没有符合条件的股票，请调整筛选条件</p>
                </div>
            </div>

            <div v-if="!searchResult && !searchLoading" class="card">
                <div class="placeholder" style="height:100px;">
                    <p style="font-size:13px;color:var(--text-muted);">设置筛选条件后点击"执行筛选"</p>
                </div>
            </div>
        </div>
    </div>
</template>

<template id="vcp-tpl">
    <div class="topbar">
        <h2>VCP 波动收缩扫描</h2>
        <span class="badge">Minervini</span>
    </div>
    <div class="content">
        <div class="card" style="border-color:var(--amber);font-size:13px;line-height:1.7;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                <span style="font-size:18px;">◐</span>
                <strong style="color:var(--amber);">Volatility Contraction Pattern · 波动收缩形态</strong>
            </div>
            <p style="color:var(--text-muted);margin:0;">
                VCP 是 <strong style="color:var(--text);">Mark Minervini</strong> 选股方法的核心形态：
                股票经历 2-6 次价格收缩（T1→T2→T3…），每次收缩幅度递减、成交量逐步萎缩，
                最后在极度紧凑的价格区间内<strong style="color:var(--green);">放量突破</strong>。
            </p>
        </div>

        <div class="card">
            <div class="config-grid">
                <div class="config-item">
                    <label>最少收缩次数</label>
                    <input v-model.number="minContractions" type="number" min="1" max="6" step="1">
                </div>
                <div class="config-item">
                    <label>最多收缩次数</label>
                    <input v-model.number="maxContractions" type="number" min="2" max="10" step="1">
                </div>
                <div class="config-item">
                    <label>单次最小收缩幅度 (%)</label>
                    <input v-model.number="minPct" type="number" min="1" max="20" step="0.5">
                </div>
                <div class="config-item">
                    <label>回溯天数</label>
                    <input v-model.number="lookbackDays" type="number" min="60" max="365" step="10">
                </div>
                <div class="config-item" style="justify-content:flex-end;">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" @click="scan" :disabled="loading">
                        <span v-if="loading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                        {{ loading ? '扫描中...' : '◐ 扫描 VCP' }}
                    </button>
                </div>
            </div>
            <div v-if="scanTime" style="font-size:12px;color:var(--text-dim);margin-top:8px;">
                扫描用时 {{ scanTime }} 秒 · 全市场扫描 {{ scannedCount }} 只
            </div>
        </div>

        <div v-if="result && result.total > 0" class="card">
            <div class="result-bar">
                <span class="count">检测到 <strong>{{ result.total }}</strong> 只 VCP 形态股
                    <span v-if="result.total <= 10" style="color:var(--amber);margin-left:8px;">| 收缩数越多 · 信号越强</span>
                </span>
                <div class="vcp-legend">
                    <span class="vcp-legend-dot" style="background:var(--green);"></span> 突破信号
                    <span class="vcp-legend-dot" style="background:var(--amber);margin-left:12px;"></span> 近轴心
                    <span class="vcp-legend-dot" style="background:var(--text-dim);margin-left:12px;"></span> 收缩中
                </div>
            </div>
        </div>

        <div v-if="result && result.rows.length" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;">
            <div v-for="(stock, si) in result.rows" :key="stock.stock_code"
                 class="card vcp-stock-card"
                 :class="{'vcp-breakout': stock.breakout_signal, 'vcp-near-pivot': stock.near_pivot}">
                <div class="vcp-card-header">
                    <div>
                        <strong class="vcp-code">{{ stock.stock_code }}</strong>
                        <span class="vcp-name">{{ stock.stock_name }}</span>
                    </div>
                    <div class="vcp-price-section">
                        <span class="vcp-price">{{ fmt(stock.latest_price) }}</span>
                        <span v-if="stock.breakout_signal" class="vcp-badge vcp-badge-breakout">🚀 突破</span>
                        <span v-else-if="stock.near_pivot" class="vcp-badge vcp-badge-ready">⚡ 临近</span>
                        <span v-else class="vcp-badge vcp-badge-building">◐ 构建中</span>
                    </div>
                </div>

                <div class="vcp-timeline">
                    <div v-for="(c, ci) in stock.contractions" :key="ci" class="vcp-tick"
                         :class="{'vcp-tick-last': ci === stock.contractions.length - 1}">
                        <div class="vcp-tick-label">{{ c.label }}</div>
                        <div class="vcp-tick-bar-wrap">
                            <div class="vcp-tick-bar" :style="{height: c.decline_pct * 3 + 'px', opacity: 1 - ci * 0.15}"></div>
                        </div>
                        <div class="vcp-tick-decline">{{ c.decline_pct }}%</div>
                        <div v-if="c.is_complete === false" class="vcp-tick-pending">进行中</div>
                    </div>
                </div>

                <div class="vcp-metrics">
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">收缩次数</span>
                        <span class="vcp-metric-val">{{ stock.contraction_count }}T</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">轴心价</span>
                        <span class="vcp-metric-val">{{ fmt(stock.pivot_price) }}</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">距轴心</span>
                        <span class="vcp-metric-val" :class="stock.distance_from_pivot_pct > 0 ? 'up' : 'down'">{{ stock.distance_from_pivot_pct > 0 ? '+' : '' }}{{ stock.distance_from_pivot_pct }}%</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">20日波幅</span>
                        <span class="vcp-metric-val">{{ stock.current_tightness }}%</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">量比(10/50)</span>
                        <span class="vcp-metric-val" :class="stock.volume_dry_up ? 'down' : 'accent'">{{ stock.volume_ratio }}x</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">MA50/MA150</span>
                        <span class="vcp-metric-val" style="font-size:11px;">{{ stock.ma50_ma150 || '-' }}</span>
                    </div>
                </div>

                <div class="vcp-volume-row">
                    <span class="vcp-volume-label">量能:</span>
                    <span v-if="stock.volume_dry_up" class="vcp-volume-dry">缩量 ✓</span>
                    <span v-if="stock.volume_surge" class="vcp-volume-surge">放量 💥</span>
                    <span v-else-if="!stock.volume_dry_up && !stock.volume_surge" class="vcp-volume-normal">正常</span>
                    <span class="vcp-volume-date" style="margin-left:auto;font-size:11px;">{{ stock.latest_date }}</span>
                </div>
            </div>

            <div v-if="!result.rows.length && !loading" class="card">
                <div class="placeholder" style="height:100px;">
                    <p>未检测到 VCP 形态，请调整参数</p>
                </div>
            </div>
        </div>
    </div>
</template>

                </div>
                <div class="profile-header-right">

        </template>
    </div>
</template>

                    <button class="btn btn-sm" :class="category==='all'?'btn-primary':'btn-outline'" @click="category='all';loadSectors()">全部</button>
                    <button class="btn btn-sm" :class="category==='industry'?'btn-primary':'btn-outline'" @click="category='industry';loadSectors()">行业</button>

                <div v-if="category==='industry'" style="display:flex;gap:4px;">
                    <button class="btn btn-sm" :class="industryLevel==='all'?'btn-primary':'btn-outline'" @click="industryLevel='all';loadSectors()">全部</button>
                    <button class="btn btn-sm" :class="industryLevel==='1'?'btn-primary':'btn-outline'" @click="industryLevel='1';loadSectors()">一级</button>
                    <button class="btn btn-sm" :class="industryLevel==='2'?'btn-primary':'btn-outline'" @click="industryLevel='2';loadSectors()">二级</button>
                </div>
                <div style="display:flex;gap:4px;">
                    <button class="btn btn-sm" :class="prosperityFilter==='all'?'btn-primary':'btn-outline'" @click="prosperityFilter='all';loadSectors()">全部景气</button>
                    <button class="btn btn-sm" :class="prosperityFilter==='high'?'btn-primary':'btn-outline'" @click="prosperityFilter='high';loadSectors()" style="color:var(--green);">高</button>
                    <button class="btn btn-sm" :class="prosperityFilter==='medium'?'btn-primary':'btn-outline'" @click="prosperityFilter='medium';loadSectors()" style="color:var(--amber);">中</button>
                    <button class="btn btn-sm" :class="prosperityFilter==='low'?'btn-primary':'btn-outline'" @click="prosperityFilter='low';loadSectors()" style="color:var(--red);">低</button>
                </div>
                <div v-if="category==='industry'" style="display:flex;gap:4px;">
                    <button class="btn btn-sm" :class="finQuarter==='annual'?'btn-primary':'btn-outline'" @click="finQuarter='annual';loadSectors()">年报</button>
                    <button class="btn btn-sm" :class="finQuarter==='q1'?'btn-primary':'btn-outline'" @click="finQuarter='q1';loadSectors()">一季</button>
                    <button class="btn btn-sm" :class="finQuarter==='q2'?'btn-primary':'btn-outline'" @click="finQuarter='q2';loadSectors()">中报</button>
                    <button class="btn btn-sm" :class="finQuarter==='q3'?'btn-primary':'btn-outline'" @click="finQuarter='q3';loadSectors()">三季</button>
                </div>
                <div style="flex:1;"></div>
                <span style="font-size:12px;color:var(--text-dim);">共 {{ sectors.length }} 个板块</span>
            </div>
        </div>

        <div v-if="loading" class="loading"><div class="spinner"></div><span>加载中...</span></div>
        <div v-if="error" class="card" style="border-color:var(--red);color:var(--red);font-size:13px;">{{ error }}</div>

        <div v-if="!loading && sectors.length" class="card" style="padding:0;">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px;">#</th>
                            <th style="cursor:pointer;" @click="toggleSort('sector_name')">板块{{ sortArrow('sector_name') }}</th>
                            <th>类型</th>
                            <th style="cursor:pointer;" @click="toggleSort('prosperity_score')">景气度{{ sortArrow('prosperity_score') }}</th>
                            <th style="cursor:pointer;text-align:right;" @click="toggleSort('today')" title="板块涨跌幅 = (最新收盘 - 前一交易日收盘) / 前一交易日收盘 × 100%">今日{{ sortArrow('today') }}</th>
                            <th style="cursor:pointer;text-align:right;" @click="toggleSort('m30')" title="30日涨跌幅 = (最新收盘 - 30日前收盘) / 30日前收盘 × 100%">30日{{ sortArrow('m30') }}</th>
                            <th style="cursor:pointer;text-align:right;" @click="toggleSort('ytd')" title="YTD涨跌幅 = (最新收盘 - 年初收盘) / 年初收盘 × 100%">YTD{{ sortArrow('ytd') }}</th>
                            <th style="cursor:pointer;text-align:right;" @click="toggleSort('relative_today')" title="相对今日 = 板块今日涨幅 − 上证综指今日涨幅">相对今日{{ sortArrow('relative_today') }}</th>
                            <th style="cursor:pointer;text-align:right;" @click="toggleSort('relative_m30')" title="相对30日 = 板块30日涨幅 − 上证综指30日涨幅">相对30日{{ sortArrow('relative_m30') }}</th>
                            <th style="cursor:pointer;text-align:right;" @click="toggleSort('relative_ytd')" title="相对YTD = 板块YTD涨幅 − 上证综指YTD涨幅">相对YTD{{ sortArrow('relative_ytd') }}</th>
                            <th v-if="showFinCols" style="cursor:pointer;text-align:right;" @click="toggleSort('total_revenue')">营收{{ sortArrow('total_revenue') }}</th>
                            <th v-if="showFinCols" style="cursor:pointer;text-align:right;" @click="toggleSort('total_net_profit')">净利{{ sortArrow('total_net_profit') }}</th>
                            <th v-if="showFinCols" style="cursor:pointer;text-align:right;" @click="toggleSort('revenue_growth')">营收增速{{ sortArrow('revenue_growth') }}</th>
                            <th v-if="showFinCols" style="cursor:pointer;text-align:right;" @click="toggleSort('net_profit_growth')">净利增速{{ sortArrow('net_profit_growth') }}</th>
                            <th style="width:50px;">对比</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="(s, i) in sectors" :key="s.sector_code" class="screening-row" @click="goToSector(s.sector_code)" style="cursor:pointer;">
                            <td>{{ i + 1 }}</td>
                            <td><strong>{{ s.sector_name }}</strong><br><span style="font-size:11px;color:var(--text-dim);">{{ s.sector_code }}</span></td>
                            <td><span class="stage-badge" :class="s.category==='industry'?'stage-badge-industry':'stage-badge-concept'" style="font-size:11px;">{{ s.category_cn }}</span></td>
                            <td><span class="stage-badge" :class="{'stage-badge-high': s.prosperity==='high', 'stage-badge-medium': s.prosperity==='medium', 'stage-badge-low': s.prosperity==='low'}" style="font-size:11px;">{{ s.prosperity==='high'?'高':s.prosperity==='medium'?'中':'低' }}</span></td>
                            <td style="text-align:right;" :class="valClass(s.today)">{{ fmtGrowth(s.today) }}</td>
                            <td style="text-align:right;" :class="valClass(s.m30)">{{ fmtGrowth(s.m30) }}</td>
                            <td style="text-align:right;" :class="valClass(s.ytd)">{{ fmtGrowth(s.ytd) }}</td>
                            <td style="text-align:right;" :class="valClass(s.relative_today)">{{ fmtGrowth(s.relative_today) }}</td>
                            <td style="text-align:right;" :class="valClass(s.relative_m30)">{{ fmtGrowth(s.relative_m30) }}</td>
                            <td style="text-align:right;font-weight:600;" :class="valClass(s.relative_ytd)">{{ fmtGrowth(s.relative_ytd) }}</td>
                            <td v-if="showFinCols" style="text-align:right;font-size:11px;" :class="valClass(s.revenue_growth)">{{ s.total_revenue ? fmtMoney(s.total_revenue) : '-' }}</td>
                            <td v-if="showFinCols" style="text-align:right;font-size:11px;" :class="valClass(s.net_profit_growth)">{{ s.total_net_profit ? fmtMoney(s.total_net_profit) : '-' }}</td>
                            <td v-if="showFinCols" style="text-align:right;font-size:11px;" :class="valClass(s.revenue_growth)">{{ s.revenue_growth != null ? fmtGrowth(s.revenue_growth) : '-' }}</td>
                            <td v-if="showFinCols" style="text-align:right;font-size:11px;" :class="valClass(s.net_profit_growth)">{{ s.net_profit_growth != null ? fmtGrowth(s.net_profit_growth) : '-' }}</td>
                            <td @click.stop>
                                <button class="btn btn-sm btn-outline" @click="addChartCode(s.sector_code)" title="添加到K线对比" style="font-size:11px;padding:2px 6px;">+</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-title">指数K线对比</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
                <span v-for="c in chartCodes" :key="c"
                      style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:12px;background:var(--bg-hover);border:1px solid var(--border);">
                    {{ c === '000001' ? '上证综指' : (sectors.find(s => s.sector_code === c)?.sector_name || c) }}
                    <span v-if="c !== '000001'" style="cursor:pointer;color:var(--text-dim);" @click="removeChartCode(c)">x</span>
                </span>
            </div>
            <div style="display:flex;gap:6px;margin-bottom:10px;">
                <button class="btn btn-sm" :class="chartDays===30?'btn-primary':'btn-outline'" @click="chartDays=30;loadChart()">1月</button>
                <button class="btn btn-sm" :class="chartDays===60?'btn-primary':'btn-outline'" @click="chartDays=60;loadChart()">2月</button>
                <button class="btn btn-sm" :class="chartDays===120?'btn-primary':'btn-outline'" @click="chartDays=120;loadChart()">半年</button>
                <button class="btn btn-sm" :class="chartDays===250?'btn-primary':'btn-outline'" @click="chartDays=250;loadChart()">1年</button>
                <button class="btn btn-sm" :class="chartDays===500?'btn-primary':'btn-outline'" @click="chartDays=500;loadChart()">2年</button>
            </div>
            <div id="strong-kline-chart" style="width:100%;"></div>
        </div>

        <div class="card" v-show="sectors.length && financeData">
            <div class="card-title" style="display:flex;align-items:center;gap:10px;">
                <span style="cursor:pointer;font-size:18px;color:var(--accent);" @click="prevFinance()">◀</span>
                <span style="cursor:pointer;color:var(--accent);" @click="goToSector(financeData?.sector_code)" title="查看成分股">{{ financeData?.sector_name || '加载中' }} <span style="font-size:11px;color:var(--text-dim);">{{ financeData?.sector_code }}</span> 业绩与股价</span>
                <span style="cursor:pointer;font-size:18px;color:var(--accent);" @click="nextFinance()">▶</span>
                <span style="font-size:11px;color:var(--text-dim);margin-left:auto;">{{ financeIndex+1 }}/{{ sectors.length }}</span>
                <div style="position:relative;margin-left:10px;">
                    <input type="text" v-model="finSearch" placeholder="搜索板块代码/名称" style="width:160px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:12px;outline:none;">
                    <div v-if="finSearch && filteredSectors.length" style="position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;max-height:200px;overflow-y:auto;z-index:10;">
                        <div v-for="s in filteredSectors" :key="s.sector_code" style="padding:4px 8px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;" @click="selectFinSector(s.sector_code)" @mouseover="s._hover=true" @mouseout="s._hover=false" :style="{background:s._hover?'var(--bg-hover)':'transparent'}">
                            <span>{{ s.sector_name }}</span>
                            <span style="color:var(--text-dim);">{{ s.sector_code }}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div v-if="latestFin" style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;margin-bottom:8px;">
                <span>营收 <b>{{ fmtMoney(latestFin.total_revenue) }}</b></span>
                <span>净利 <b>{{ fmtMoney(latestFin.total_net_profit) }}</b></span>
                <span>营收增速 <b :class="valClass(latestFin.revenue_growth)">{{ fmtGrowth(latestFin.revenue_growth) }}</b></span>
                <span>净利增速 <b :class="valClass(latestFin.net_profit_growth)">{{ fmtGrowth(latestFin.net_profit_growth) }}</b></span>
            </div>
            <div style="display:flex;gap:4px;margin-bottom:6px;">
                <button class="btn btn-sm" :class="finQuarter==='annual'?'btn-primary':'btn-outline'" @click="finQuarter='annual';redrawFinance()">年度</button>
                <button class="btn btn-sm" :class="finQuarter==='q1'?'btn-primary':'btn-outline'" @click="finQuarter='q1';redrawFinance()">一季度</button>
                <button class="btn btn-sm" :class="finQuarter==='q2'?'btn-primary':'btn-outline'" @click="finQuarter='q2';redrawFinance()">二季度</button>
                <button class="btn btn-sm" :class="finQuarter==='q3'?'btn-primary':'btn-outline'" @click="finQuarter='q3';redrawFinance()">三季度</button>
            </div>
            <div id="finance-chart" style="width:100%;height:300px;position:relative;">
                <div id="finance-tooltip" style="display:none;position:absolute;pointer-events:none;z-index:5;background:#151929;border:1px solid #2a2a40;border-radius:6px;padding:8px 12px;font-size:12px;line-height:1.6;min-width:140px;"></div>
            </div>
        </div>
    </div>
</template>

<!-- ── Strong Stocks Page (Sector Detail) ── -->
<template id="strong-stocks-tpl">
    <div class="topbar">
        <h2 v-if="mode==='c'" style="cursor:pointer;" @click="goBack">← {{ sectorData?.name || '板块' }}</h2>
        <h2 v-else>★ 强势个股跨板比较</h2>
        <span class="badge" v-if="mode==='c' && sectorData">{{ sectorData.category_cn }}</span>
        <span class="badge" v-if="mode==='c' && sectorData" style="background:var(--green);">YTD {{ fmtGrowth(sectorData.ytd) }}</span>
        <div v-if="mode==='d'" style="display:flex;gap:6px;margin-left:auto;">
            <button v-for="cat in ['all','industry','concept']" :key="cat"
                    class="btn btn-sm" :class="topCategory===cat?'btn-primary':'btn-outline'"
                    @click="topCategory=cat; loadTopStocks()">
                {{ cat==='all'?'全部':cat==='industry'?'行业':'概念' }}
            </button>
            <select v-model="topN" @change="loadTopStocks()" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:2px 8px;font-size:12px;">
                <option :value="3">Top 3</option>
                <option :value="5">Top 5</option>
                <option :value="10">Top 10</option>
            </select>
        </div>
    </div>
    <div class="content">
        <div v-if="loading" class="loading"><div class="spinner"></div><span>加载中...</span></div>
        <div v-if="error" class="card" style="border-color:var(--red);color:var(--red);font-size:13px;">{{ error }}</div>

        <!-- Page D: 强势个股跨板比较 -->
        <template v-if="mode==='d'">
            <div v-if="!loading && topSectors.length" class="card" style="padding:0;">
                <div class="table-wrap" style="padding:12px;">
                    <div v-for="sec in topSectors" :key="sec.sector_code" style="margin-bottom:16px;">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                            <span style="font-weight:600;font-size:14px;">{{ sec.sector_name }}</span>
                            <span class="badge" :style="{background: sec.sector_ytd>=0?'var(--green)':'var(--red)'}">
                                YTD {{ fmtGrowth(sec.sector_ytd) }}
                            </span>
                        </div>
                        <div v-for="(st, si) in sec.stocks" :key="st.stock_code"
                             style="display:flex;align-items:center;gap:10px;padding:4px 0;font-size:13px;cursor:pointer;"
                             @click="openSectorStock(sec.sector_code, st.stock_code)">
                            <span style="width:20px;text-align:right;color:var(--text-dim);">{{ si+1 }}</span>
                            <span style="width:60px;font-weight:600;">{{ st.stock_code }}</span>
                            <span style="width:80px;">{{ st.stock_name }}</span>
                            <span :style="{color:st.relative_ytd>=0?'var(--green)':'var(--red)'}" style="width:70px;text-align:right;font-weight:600;">
                                {{ fmtGrowth(st.relative_ytd) }}
                            </span>
                            <div style="flex:1;height:14px;background:var(--bg-hover);border-radius:3px;overflow:hidden;">
                                <div :style="{width: barWidth(st.relative_ytd, sec)+'%', background: st.relative_ytd>=0?'var(--green)':'var(--red)'}"
                                     style="height:100%;border-radius:3px;transition:width .3s;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Page C: 板块成分股 -->
        <template v-if="mode==='c'">
            <div class="card" v-if="sectorData && indexRef">
                <div style="display:flex;gap:20px;font-size:13px;flex-wrap:wrap;">
                    <div>
                        <span style="color:var(--text-dim);">板块</span>
                        <b :class="valClass(sectorData.today)" style="margin-left:6px;">今日 {{ fmtGrowth(sectorData.today) }}</b>
                        <b :class="valClass(sectorData.m30)" style="margin-left:8px;">30日 {{ fmtGrowth(sectorData.m30) }}</b>
                        <b :class="valClass(sectorData.ytd)" style="margin-left:8px;">YTD {{ fmtGrowth(sectorData.ytd) }}</b>
                    </div>
                    <div style="color:var(--text-dim);">|</div>
                    <div>
                        <span style="color:var(--text-dim);">上证综指</span>
                        <span style="margin-left:6px;">今日 {{ fmtGrowth(indexRef.today) }}</span>
                        <span style="margin-left:8px;">30日 {{ fmtGrowth(indexRef.m30) }}</span>
                        <span style="margin-left:8px;">YTD {{ fmtGrowth(indexRef.ytd) }}</span>
                    </div>
                </div>
            </div>

            <div class="card" v-if="sectorFinData && sectorFinData.finance && sectorFinData.finance.length" style="font-size:12px;">
                <div style="display:flex;gap:16px;flex-wrap:wrap;">
                    <span>营收 <b>{{ fmtMoney(sectorFinData.finance[sectorFinData.finance.length-1].total_revenue) }}</b></span>
                    <span>净利 <b>{{ fmtMoney(sectorFinData.finance[sectorFinData.finance.length-1].total_net_profit) }}</b></span>
                    <span>营收增速 <b :class="valClass(sectorFinData.finance[sectorFinData.finance.length-1].revenue_growth)">{{ fmtGrowth(sectorFinData.finance[sectorFinData.finance.length-1].revenue_growth) }}</b></span>
                    <span>净利增速 <b :class="valClass(sectorFinData.finance[sectorFinData.finance.length-1].net_profit_growth)">{{ fmtGrowth(sectorFinData.finance[sectorFinData.finance.length-1].net_profit_growth) }}</b></span>
                </div>
            </div>

            <div v-if="!loading && stocks.length" class="card" style="padding:0;">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:40px;">#</th>
                                <th>代码</th>
                                <th>名称</th>
                                <th style="text-align:right;">现价</th>
                                <th style="cursor:pointer;text-align:right;" @click="toggleSort('today')">今日{{ sortArrow('today') }}</th>
                                <th style="cursor:pointer;text-align:right;" @click="toggleSort('m30')">30日{{ sortArrow('m30') }}</th>
                                <th style="cursor:pointer;text-align:right;" @click="toggleSort('ytd')">YTD{{ sortArrow('ytd') }}</th>
                                <th style="cursor:pointer;text-align:right;" @click="toggleSort('relative_ytd')">相对YTD{{ sortArrow('relative_ytd') }}</th>
                                <th style="cursor:pointer;text-align:right;" @click="toggleSort('sector_relative_ytd')">超板块{{ sortArrow('sector_relative_ytd') }}</th>
                                <th style="width:60px;">K线</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(s, i) in stocks" :key="s.stock_code"
                                class="screening-row" :class="{'screening-row-active': selectedStocks.includes(s.stock_code)}"
                                @click="toggleStock(s.stock_code)" style="cursor:pointer;">
                                <td>{{ i + 1 }}</td>
                                <td><strong style="color:var(--accent);cursor:pointer;" @click.stop="goToStock(s.stock_code)">{{ s.stock_code }}</strong></td>
                                <td style="cursor:pointer;color:var(--accent);" @click.stop="goToStock(s.stock_code)">{{ s.stock_name }}</td>
                                <td style="text-align:right;">{{ fmt(s.latest_price) }}</td>
                                <td style="text-align:right;" :class="valClass(s.today)">{{ fmtGrowth(s.today) }}</td>
                                <td style="text-align:right;" :class="valClass(s.m30)">{{ fmtGrowth(s.m30) }}</td>
                                <td style="text-align:right;" :class="valClass(s.ytd)">{{ fmtGrowth(s.ytd) }}</td>
                            <td style="text-align:right;font-weight:600;" :class="valClass(s.relative_ytd)">{{ fmtGrowth(s.relative_ytd) }}</td>
                                <td style="text-align:right;" :class="valClass(s.sector_relative_ytd)">{{ fmtGrowth(s.sector_relative_ytd) }}</td>
                                <td>
                                    <button class="btn btn-sm" :class="selectedStocks.includes(s.stock_code)?'btn-primary':'btn-outline'"
                                            @click.stop="toggleStock(s.stock_code)" style="font-size:11px;padding:2px 6px;">
                                        {{ selectedStocks.includes(s.stock_code) ? '✓' : '+' }}
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
        </div>

        <div class="card">
                <div class="card-title">成分股K线对比</div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
                    <span v-for="(s, i) in chartSeries" :key="s.code"
                          style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:12px;"
                          :style="{background: CHART_COLORS[i % CHART_COLORS.length] + '22', border: '1px solid ' + CHART_COLORS[i % CHART_COLORS.length] + '66', color: CHART_COLORS[i % CHART_COLORS.length]}">
                        {{ s.name }}
                    </span>
                </div>
                <div id="stock-kline-chart" style="width:100%;"></div>
            </div>
        </template>
    </div>
</template>

<script src="https://unpkg.com/vue@3.4/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="app.js"></script>
</body>
</html>
