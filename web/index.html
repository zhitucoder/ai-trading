<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">AI<span>Trade</span></div>
        <nav>
            <a v-for="p in pages" :key="p.id"
               :class="{ active: currentPage === p.id }"
               @click="currentPage = p.id">
                <span class="icon">{{ p.icon }}</span>
                {{ p.label }}
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="main">
        <screening-page v-if="currentPage === 'screening'"></screening-page>
        <position-bt-page v-else-if="currentPage === 'position_bt'"></position-bt-page>
        <ma-bt-page v-else-if="currentPage === 'ma_bt'"></ma-bt-page>
        <profile-page v-else-if="currentPage === 'profile'"></profile-page>
        <debate-page v-else-if="currentPage === 'debate'"></debate-page>
        <placeholder-page v-else :page="pages.find(p => p.id === currentPage)"></placeholder-page>
    </div>
</div>

<!-- Screening Template -->
<template id="screening-tpl">
    <div class="topbar">
        <h2>选股策略</h2>
        <span class="badge">智能筛选</span>
    </div>
    <div class="content">
        <!-- Error -->
        <div class="card" v-if="error" style="border-color:var(--red);color:var(--red);font-size:13px;">
            {{ error }}
        </div>

        <!-- Strategy Tabs -->
        <div class="strategy-tabs">
            <button class="strategy-tab" :class="{ active: tabType === 'technical' }"
                    @click="tabType = 'technical'; selectedStrategy = null; result = null">技术指标</button>
            <button class="strategy-tab" :class="{ active: tabType === 'fundamental' }"
                    @click="tabType = 'fundamental'; selectedStrategy = null; result = null">基本面指标</button>
            <button class="strategy-tab" :class="{ active: tabType === 'combined' }"
                    @click="tabType = 'combined'; selectedStrategy = null; result = null">组合筛选</button>
        </div>

        <!-- Strategy Cards -->
        <div class="card" v-for="s in currentStrategies" :key="s.id"
             v-show="tabType !== 'fundamental' || s.id === 'fundamental_all'"
             :style="{ borderColor: isSelected(s.id) ? 'var(--accent)' : '' }">
            <div class="card-title">
                {{ s.name }}
                <span class="hint">{{ s.description }}</span>
            </div>
            <div v-if="tabType === 'technical' && s.id === 'ma_bullish'" class="config-grid">
                <div class="config-item">
                    <label>均线周期（逗号分隔）</label>
                    <input v-model="maPeriods" placeholder="5,10,20,60">
                </div>
            </div>
            <div v-if="tabType === 'fundamental' && s.id === 'fundamental_all'" class="config-grid">
                <div class="config-item">
                    <label>营收增长率下限 (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                </div>
                <div class="config-item">
                    <label>净利润增长率下限 (%)</label>
                    <input v-model.number="profitThreshold" type="number" step="1">
                </div>
                <div class="config-item">
                    <label>资产负债率上限 (%)</label>
                    <input v-model.number="debtThreshold" type="number" step="1">
                </div>
            </div>
            <div v-if="tabType === 'combined' && s.id === 'ma_bullish_and_revenue_growth'" class="config-grid">
                <div class="config-item">
                    <label>均线周期（逗号分隔）</label>
                    <input v-model="maPeriods" placeholder="5,10,20,60">
                </div>
                <div class="config-item">
                    <label>营收增长率下限 (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                </div>
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-primary" @click="selectStrategy(s.id)" :disabled="isSelected(s.id)">
                    {{ isSelected(s.id) ? '✓ 已选择' : '选择此策略' }}
                </button>
            </div>
        </div>

        <!-- Execute -->
        <div v-if="selectedStrategy" class="card" style="display:flex;align-items:center;gap:16px;">
            <span style="font-size:13px;color:var(--text-muted);">
                已选策略: <strong style="color:var(--accent);">{{ currentStrategies.find(s=>s.id===selectedStrategy)?.name || selectedStrategy }}</strong>
            </span>
            <button class="btn btn-primary" @click="execute" :disabled="loading">
                <span v-if="loading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                {{ loading ? '筛选中...' : '▶ 执行筛选' }}
            </button>
        </div>

        <!-- Results -->
        <div v-if="result" class="card">
            <div class="result-bar">
                <span class="count">共筛选出 <strong>{{ result.total }}</strong> 只股票</span>
            </div>
            <div class="table-wrap" v-if="result.rows && result.rows.length">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:40px;">#</th>
                                    <th style="width:80px;">代码</th>
                                    <th style="width:90px;">名称</th>
                                    <th v-for="col in result.columns" :key="col">
                                        <template v-if="col === 'close_price'">最新价</template>
                                        <template v-else-if="col === 'report_date'">报告期</template>
                                        <template v-else-if="col === 'revenue_growth_rate'">营收增长率</template>
                                        <template v-else-if="col === 'net_profit_growth_rate'">净利润增长率</template>
                                        <template v-else-if="col === 'debt_ratio'">资产负债率</template>
                                        <template v-else-if="col === 'q_revenue'">单季营业收入</template>
                                        <template v-else-if="col === 'q_parent_net_profit'">单季归母净利润</template>
                                        <template v-else>{{ col }}</template>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="(row, i) in result.rows" :key="i">
                                    <td>{{ i + 1 }}</td>
                                    <td><strong>{{ row.stock_code }}</strong></td>
                                    <td>{{ row.stock_name }}</td>
                                    <td v-for="col in result.columns" :key="col" :class="valClass(row[col])">
                                        <template v-if="col === 'close_price' || col.startsWith('ma')">
                                            {{ fmt(row[col]) }}
                                        </template>
                                        <template v-else-if="col.includes('growth') || col.includes('ratio')">
                                            {{ fmtGrowth(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'q_revenue' || col === 'q_parent_net_profit'">
                                            {{ fmtMoney(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'report_date'">
                                            {{ row[col] ? String(row[col]).substring(0, 10) : '' }}
                                        </template>
                                        <template v-else>
                                            {{ row[col] ?? '-' }}
                                        </template>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
            </div>
            <div v-else class="placeholder" style="height:100px;">
                <p style="font-size:13px;color:var(--text-muted);">没有符合条件的股票</p>
            </div>
        </div>
    </div>
</template>

<!-- ── Position Backtest Template ── -->
<template id="position-bt-tpl">
    <div class="topbar">
        <h2>建仓回测</h2>
        <span class="badge">交互式</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="form-row">
                <div class="config-item" style="min-width:100px;">
                    <label>股票代码</label>
                    <input v-model="stockCode" placeholder="600519" @keyup.enter="loadKline">
                </div>
                <div class="config-item" style="min-width:100px;">
                    <label>K线天数</label>
                    <input v-model.number="klineDays" type="number" min="60" max="2000">
                </div>
                <div class="config-item" style="min-width:100px;">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" @click="loadKline" :disabled="klineLoading">
                        {{ klineLoading ? '加载中...' : '加载K线' }}
                    </button>
                </div>
                <div v-if="stockName" class="config-item" style="justify-content:flex-end;">
                    <span style="font-size:16px;font-weight:700;color:var(--accent);">{{ stockCode }} {{ stockName }}</span>
                </div>
            </div>
        </div>

        <div v-if="chartData.length" class="trade-toggle">
            <button class="toggle-btn buy" :class="{ active: tradeDirection === 'buy' }" @click="tradeDirection='buy'">▲ 买入</button>
            <button class="toggle-btn sell" :class="{ active: tradeDirection === 'sell' }" @click="tradeDirection='sell'">▼ 卖出</button>
            <span style="font-size:12px;color:var(--text-muted);margin-left:12px;line-height:34px;">点击K线柱添加交易记录（每手100股）</span>
        </div>

        <div v-if="chartData.length" class="chart-box" ref="chartRef"></div>

        <div v-if="trades.length" class="card">
            <div class="card-title">交易记录 ({{ trades.length }})</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>日期</th><th>方向</th><th>股数</th><th>价格</th><th>金额</th><th>操作</th></tr></thead>
                    <tbody>
                        <tr v-for="(t, i) in trades" :key="i">
                            <td>{{ t.date }}</td>
                            <td><span :style="{color:t.direction==='buy'? 'var(--red)':'var(--green)'}">{{ t.direction==='buy' ? '买入' : '卖出' }}</span></td>
                            <td>{{ t.shares }}</td>
                            <td>{{ fmt(t.price) }}</td>
                            <td>{{ fmt(t.shares * t.price) }}</td>
                            <td><button class="btn-delete" @click="deleteTrade(i)">删除</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div v-if="trades.length" style="margin-top:12px;">
                <button class="btn btn-primary" @click="runPositionBt" :disabled="btLoading">
                    {{ btLoading ? '计算中...' : '▶ 计算回测结果' }}
                </button>
            </div>
        </div>

        <div v-if="btResult.summary && Object.keys(btResult.summary).length" class="card">
            <div class="card-title">持仓汇总</div>
            <div class="summary-grid">
                <div class="summary-item"><div class="label">已投入总金额</div><div class="value accent">{{ fmtMoney(btResult.summary.total_invested) }}</div></div>
                <div class="summary-item"><div class="label">当前持仓市值</div><div class="value accent">{{ fmtMoney(btResult.summary.final_market_value) }}</div></div>
                <div class="summary-item"><div class="label">已卖出金额</div><div class="value accent">{{ fmtMoney(btResult.summary.total_sold_value) }}</div></div>
                <div class="summary-item"><div class="label">盈亏金额</div><div class="value" :class="btResult.summary.total_pnl >= 0 ? 'green' : 'red'">{{ fmtMoney(btResult.summary.total_pnl) }}</div></div>
                <div class="summary-item"><div class="label">总收益率</div><div class="value" :class="btResult.summary.total_return >= 0 ? 'green' : 'red'">{{ btResult.summary.total_return }}%</div></div>
                <div class="summary-item"><div class="label">最大回撤</div><div class="value red">{{ btResult.summary.max_drawdown }}%</div></div>
                <div class="summary-item"><div class="label">持仓股数</div><div class="value accent">{{ btResult.summary.shares_held }}</div></div>
            </div>
        </div>

        <div v-if="paginatedPnl.length" class="card">
            <div class="card-title">逐日盈亏明细</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>日期</th><th>持仓</th><th>市值</th><th>累计盈亏</th></tr></thead>
                    <tbody>
                        <tr v-for="d in paginatedPnl" :key="d.date">
                            <td>{{ d.date }}</td>
                            <td>{{ d.shares_held }}</td>
                            <td>{{ fmtMoney(d.market_value) }}</td>
                            <td :style="{color:d.cumulative_pnl>=0?'var(--green)':'var(--red)'}">{{ fmtMoney(d.cumulative_pnl) }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <button class="page-btn" :disabled="pnlPage <= 1" @click="pnlPage--">‹</button>
                <span class="page-info">{{ pnlPage }} / {{ pnlTotalPages }}</span>
                <button class="page-btn" :disabled="pnlPage >= pnlTotalPages" @click="pnlPage++">›</button>
            </div>
        </div>
    </div>
</template>

<!-- ── MA Backtest Template ── -->
<template id="ma-bt-tpl">
    <div class="topbar">
        <h2>均线回测</h2>
        <span class="badge">MA策略</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="card-title">策略参数</div>
            <div class="form-row">
                <div class="config-item"><label>股票代码</label><input v-model="maStockCode" placeholder="600519" @keyup.enter="runMaBt"></div>
                <div class="config-item"><label>开始日期</label><input v-model="maStartDate" type="date"></div>
                <div class="config-item"><label>结束日期</label><input v-model="maEndDate" type="date"></div>
                <div class="config-item"><label>短期均线</label><input v-model.number="maShort" type="number" min="2" max="120"></div>
                <div class="config-item"><label>长期均线</label><input v-model.number="maLong" type="number" min="5" max="250"></div>
                <div class="config-item"><label>总资金</label><input v-model.number="maAmount" type="number" min="10000"></div>
                <div class="config-item"><label>&nbsp;</label><button class="btn btn-primary" @click="runMaBt" :disabled="maLoading">{{ maLoading ? '运行中...' : '▶ 运行回测' }}</button></div>
            </div>
            <div v-if="maResult.summary && Object.keys(maResult.summary).length" style="margin-top:8px;">
                <div class="summary-grid">
                    <div class="summary-item"><div class="label">总收益率</div><div class="value" :class="maResult.summary.total_return>=0?'green':'red'">{{ maResult.summary.total_return }}%</div></div>
                    <div class="summary-item"><div class="label">交易次数</div><div class="value accent">{{ maResult.summary.total_trades }}</div></div>
                    <div class="summary-item"><div class="label">胜率</div><div class="value accent">{{ maResult.summary.win_rate }}%</div></div>
                    <div class="summary-item"><div class="label">最大回撤</div><div class="value red">{{ maResult.summary.max_drawdown }}%</div></div>
                    <div class="summary-item"><div class="label">总盈亏</div><div class="value" :class="maResult.summary.total_pnl>=0?'green':'red'">{{ fmtMoney(maResult.summary.total_pnl) }}</div></div>
                    <div class="summary-item"><div class="label">剩余现金</div><div class="value accent">{{ fmtMoney(maResult.summary.final_cash) }}</div></div>
                    <div class="summary-item"><div class="label">持仓股数</div><div class="value accent">{{ maResult.summary.final_shares }}</div></div>
                </div>
            </div>
        </div>

        <div v-if="maResult.trades && maResult.trades.length" class="chart-box" ref="maChartRef"></div>

        <div v-if="maResult.trades && maResult.trades.length" class="card">
            <div class="card-title">交易明细 ({{ maResult.trades.length }})</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>买入日</th><th>买入价</th><th>卖出日</th><th>卖出价</th><th>股数</th><th>盈亏</th><th>收益率</th></tr></thead>
                    <tbody>
                        <tr v-for="t in maResult.trades" :key="t.entry_date">
                            <td>{{ t.entry_date }}</td><td>{{ fmt(t.entry_price) }}</td>
                            <td>{{ t.exit_date || '-' }}</td><td>{{ t.exit_price ? fmt(t.exit_price) : '-' }}</td>
                            <td>{{ t.shares }}</td>
                            <td :style="{color:(t.pnl||0)>=0?'var(--green)':'var(--red)'}">{{ t.pnl ? fmtMoney(t.pnl) : '-' }}</td>
                            <td :style="{color:(t.pnl_pct||0)>=0?'var(--green)':'var(--red)'}">{{ t.pnl_pct ? t.pnl_pct+'%' : '-' }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div v-if="maResult.daily && maResult.daily.length" class="card">
            <div class="card-title">逐日盈亏</div>
            <div class="table-wrap">
                        <table>
                            <thead><tr><th>日期</th><th>收盘价</th><th>状态</th><th>现金</th><th>持股</th><th>总资产</th><th>累计盈亏</th></tr></thead>
                            <tbody>
                                <tr v-for="d in maResult.daily" :key="d.date">
                                    <td>{{ d.date }}</td><td>{{ fmt(d.close_price) }}</td>
                                    <td>{{ d.in_position ? '持仓' : '空仓' }}</td>
                                    <td>{{ fmtMoney(d.cash) }}</td>
                                    <td>{{ d.shares_held }}</td>
                                    <td>{{ fmtMoney(d.portfolio) }}</td>
                                    <td :style="{color:d.cumulative_pnl>=0?'var(--green)':'var(--red)'}">{{ fmtMoney(d.cumulative_pnl) }}</td>
                                </tr>
                            </tbody>
                        </table>
            </div>
        </div>
    </div>
</template>

<!-- ── Profile Template ── -->
<template id="profile-tpl">
    <div class="topbar">
        <h2>股票画像</h2>
        <span class="badge" v-if="profileStatusData">{{ profileStatusData.latest_data_date || '未缓存' }}</span>
        <button v-if="activeTab === 'screening'" class="btn btn-outline btn-sm" style="margin-left:auto;" @click="triggerRefresh" :disabled="refreshing">
            <span v-if="refreshing" class="spinner" style="display:inline-block;width:12px;height:12px;border-width:2px;vertical-align:middle;margin-right:4px;"></span>
            {{ refreshing ? refreshProgress : '⟳ 刷新缓存' }}
        </button>
        <span v-if="refreshToast" style="margin-left:12px;color:#22c55e;font-size:13px;">{{ refreshToast }}</span>
    </div>
    <div class="profile-tabs">
        <button :class="{ active: activeTab === 'single' }" @click="activeTab = 'single'">单股画像</button>
        <button :class="{ active: activeTab === 'screening' }" @click="activeTab = 'screening'">画像筛选</button>
    </div>
    <div class="content">
        <!-- ══════ Tab1: 单股画像 ══════ -->
        <div v-if="activeTab === 'single'">
            <div class="card">
                <div class="form-row">
                    <div class="config-item" style="min-width:120px;">
                        <label>股票代码</label>
                        <input v-model="stockCode" placeholder="600519" @keyup.enter="loadProfile" style="width:140px;">
                    </div>
                    <div class="config-item" style="min-width:100px;">
                        <label>&nbsp;</label>
                        <button class="btn btn-primary" @click="loadProfile" :disabled="loading">
                            {{ loading ? '加载中...' : '▶ 生成画像' }}
                        </button>
                    </div>
                </div>
            </div>

            <div v-if="error" class="card" style="border-color:var(--red);color:var(--red);font-size:13px;">
                {{ error }}
            </div>

            <template v-if="profile">
                <div class="profile-header">
                    <div class="profile-header-left">
                        <div class="profile-code">{{ profile.code }}</div>
                        <div class="profile-name">{{ profile.name }}</div>
                    </div>
                    <div class="profile-header-right">
                        <div class="profile-price">{{ fmt(profile.latest_price) }}</div>
                        <div class="profile-change" :class="valClass(profile.price_change_pct)">{{ fmtGrowth(profile.price_change_pct) }}</div>
                    </div>
                </div>

                <div class="profile-row-2col">
                    <div class="profile-stage-card" :class="'stage-' + (profile.stage.id || '').replace('stage.', '')">
                        <div class="profile-stage-label">{{ profile.stage.name }}</div>
                        <div class="profile-stage-id">{{ profile.stage.id }}</div>
                        <div class="profile-stage-bar"><div class="profile-stage-bar-fill" :style="{width: profile.stage.confidence + '%'}"></div></div>
                        <div class="profile-stage-conf">置信度 {{ profile.stage.confidence }}%</div>
                    </div>
                    <div class="profile-scores">
                        <div class="profile-score-item">
                            <div class="profile-score-label">技术面评分</div>
                            <div class="profile-score-bar-wrap"><div class="profile-score-bar" :class="scoreClass(profile.scores.tech)"><div class="profile-score-fill" :style="{width: profile.scores.tech + '%'}"></div></div></div>
                            <div class="profile-score-val" :class="scoreClass(profile.scores.tech)">{{ profile.scores.tech }}</div>
                        </div>
                        <div class="profile-score-item">
                            <div class="profile-score-label">基本面评分</div>
                            <div class="profile-score-bar-wrap"><div class="profile-score-bar" :class="scoreClass(profile.scores.fund)"><div class="profile-score-fill" :style="{width: profile.scores.fund + '%'}"></div></div></div>
                            <div class="profile-score-val" :class="scoreClass(profile.scores.fund)">{{ profile.scores.fund }}</div>
                        </div>
                    </div>
                </div>

                <div class="card" v-if="profile.biz_tags && profile.biz_tags.length">
                    <div class="card-title">业务标签</div>
                    <div class="profile-tag-grid">
                        <div v-for="t in profile.biz_tags" :key="t.id" class="profile-tag profile-tag-biz" :title="t.id">{{ t.name }}</div>
                    </div>
                </div>

                <div class="card" v-if="profile.ma_values">
                    <div class="card-title">关键指标</div>
                    <div class="profile-ind-grid">
                        <div class="profile-ind-item"><div class="profile-ind-label">MA5</div><div class="profile-ind-val">{{ fmt(profile.ma_values.ma5) }}</div></div>
                        <div class="profile-ind-item"><div class="profile-ind-label">MA10</div><div class="profile-ind-val">{{ fmt(profile.ma_values.ma10) }}</div></div>
                        <div class="profile-ind-item"><div class="profile-ind-label">MA20</div><div class="profile-ind-val">{{ fmt(profile.ma_values.ma20) }}</div></div>
                        <div class="profile-ind-item"><div class="profile-ind-label">MA50</div><div class="profile-ind-val">{{ fmt(profile.ma_values.ma50) }}</div></div>
                        <div class="profile-ind-item"><div class="profile-ind-label">MA60</div><div class="profile-ind-val">{{ fmt(profile.ma_values.ma60) }}</div></div>
                        <div class="profile-ind-item"><div class="profile-ind-label">MA150</div><div class="profile-ind-val">{{ fmt(profile.ma_values.ma150) }}</div></div>
                        <div class="profile-ind-item"><div class="profile-ind-label">MA200</div><div class="profile-ind-val">{{ fmt(profile.ma_values.ma200) }}</div></div>
                        <div class="profile-ind-item"><div class="profile-ind-label">RSI14</div><div class="profile-ind-val" :class="rsiClass(profile.ma_values.rsi14)">{{ profile.ma_values.rsi14 != null ? profile.ma_values.rsi14.toFixed(1) : '-' }}</div></div>
                    </div>
                </div>

                <div class="card" v-if="profile.fin_data && profile.fin_data.report_date">
                    <div class="card-title">财务数据 <span style="font-size:12px;color:var(--text-muted);font-weight:400;">（{{ profile.fin_data.report_date }}）</span></div>
                    <div class="profile-ind-grid">
                        <div class="profile-ind-item" v-if="profile.fin_data.revenue_growth_rate != null"><div class="profile-ind-label">营收增长率</div><div class="profile-ind-val" :class="valClass(profile.fin_data.revenue_growth_rate)">{{ fmtGrowth(profile.fin_data.revenue_growth_rate) }}</div></div>
                        <div class="profile-ind-item" v-if="profile.fin_data.net_profit_growth_rate != null"><div class="profile-ind-label">净利润增长率</div><div class="profile-ind-val" :class="valClass(profile.fin_data.net_profit_growth_rate)">{{ fmtGrowth(profile.fin_data.net_profit_growth_rate) }}</div></div>
                        <div class="profile-ind-item" v-if="profile.fin_data.debt_ratio != null"><div class="profile-ind-label">资产负债率</div><div class="profile-ind-val" :class="debtClass(profile.fin_data.debt_ratio)">{{ profile.fin_data.debt_ratio.toFixed(2) }}%</div></div>
                        <div class="profile-ind-item" v-if="profile.fin_data.revenue_cagr_3y != null"><div class="profile-ind-label">营收3年CAGR</div><div class="profile-ind-val" :class="valClass(profile.fin_data.revenue_cagr_3y)">{{ fmtGrowth(profile.fin_data.revenue_cagr_3y) }}</div></div>
                        <div class="profile-ind-item" v-if="profile.fin_data.net_profit_cagr_3y != null"><div class="profile-ind-label">净利润3年CAGR</div><div class="profile-ind-val" :class="valClass(profile.fin_data.net_profit_cagr_3y)">{{ fmtGrowth(profile.fin_data.net_profit_cagr_3y) }}</div></div>
                        <div class="profile-ind-item" v-if="profile.fin_data.q_revenue != null"><div class="profile-ind-label">单季营业收入</div><div class="profile-ind-val accent">{{ fmtMoney(profile.fin_data.q_revenue) }}</div></div>
                        <div class="profile-ind-item" v-if="profile.fin_data.q_parent_net_profit != null"><div class="profile-ind-label">单季归母净利润</div><div class="profile-ind-val accent">{{ fmtMoney(profile.fin_data.q_parent_net_profit) }}</div></div>
                    </div>
                </div>

                <div class="card" v-if="profile.ind_tags && profile.ind_tags.length">
                    <div class="card-title">指标标签</div>
                    <div class="profile-tag-grid">
                        <div v-for="t in profile.ind_tags" :key="t.id" class="profile-tag profile-tag-ind" :title="t.id">{{ t.name }}</div>
                    </div>
                </div>
            </template>
        </div>

        <!-- ══════ Tab2: 画像筛选 ══════ -->
        <div v-if="activeTab === 'screening'">
            <div class="screening-panel">
                <div class="screening-section">
                    <div class="screening-section-title">阶段</div>
                    <div class="screening-stage-group">
                        <button v-for="s in stageOptions" :key="s.id"
                                class="screening-stage-btn" :class="{ active: selectedStages.includes(s.id) }"
                                @click="toggleStage(s.id)">{{ s.label }}</button>
                    </div>
                </div>

                <div class="screening-section">
                    <div class="screening-section-title">评分</div>
                    <div class="screening-slider-row">
                        <span>技术评分 ≥</span>
                        <input type="range" min="0" max="100" v-model.number="filterTechScore" @input="onFilterChange">
                        <span class="screening-slider-val">{{ filterTechScore }}</span>
                    </div>
                    <div class="screening-slider-row">
                        <span>基本面评分 ≥</span>
                        <input type="range" min="0" max="100" v-model.number="filterFundScore" @input="onFilterChange">
                        <span class="screening-slider-val">{{ filterFundScore }}</span>
                    </div>
                </div>

                <div class="screening-section">
                    <div class="screening-section-title">增长率 & 负债率</div>
                    <div class="screening-range-row">
                        <div><label>营收增长率 ≥</label><input type="number" v-model.number="filterRevGrowth" @input="onFilterChange" style="width:80px;" placeholder="%"></div>
                        <div><label>净利润增长率 ≥</label><input type="number" v-model.number="filterProfitGrowth" @input="onFilterChange" style="width:80px;" placeholder="%"></div>
                        <div><label>负债率 ≤</label><input type="number" v-model.number="filterDebtMax" @input="onFilterChange" style="width:80px;" placeholder="%"></div>
                    </div>
                </div>

                <div class="screening-actions">
                    <button class="btn btn-primary" @click="doSearch" :disabled="searchLoading">
                        {{ searchLoading ? '搜索中...' : '▶ 执行筛选' }}
                    </button>
                    <span v-if="searchResult" class="screening-count">共 <strong>{{ searchResult.total }}</strong> 只</span>
                    <button v-if="searchResult" class="btn btn-outline btn-sm" @click="resetFilters" style="margin-left:8px;">重置</button>
                </div>
            </div>

            <div v-if="searchLoading" class="loading"><div class="spinner"></div><span>搜索中...</span></div>

            <div v-if="searchResult && searchResult.rows.length" class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:36px;">#</th>
                                <th style="width:80px;">代码</th>
                                <th style="width:80px;">名称</th>
                                <th style="width:80px;">价格</th>
                                <th style="width:60px;">涨幅</th>
                                <th style="width:80px;">阶段</th>
                                <th style="width:60px;">技术</th>
                                <th style="width:60px;">基本</th>
                                <th style="width:80px;">营收增长</th>
                                <th style="width:80px;">利润增长</th>
                                <th>标签</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(row, i) in searchResult.rows" :key="row.stock_code"
                                class="screening-row" @click="goToProfile(row.stock_code)">
                                <td>{{ (searchResult.page - 1) * searchResult.page_size + i + 1 }}</td>
                                <td><strong>{{ row.stock_code }}</strong></td>
                                <td>{{ row.stock_name }}</td>
                                <td>{{ fmt(row.latest_price) }}</td>
                                <td :class="valClass(row.price_change_pct)">{{ fmtGrowth(row.price_change_pct) }}</td>
                                <td><span :class="'stage-badge stage-' + (row.stage_id || '').replace('stage.', '')">{{ row.stage_name }}</span></td>
                                <td :class="scoreTextClass(row.tech_score)">{{ row.tech_score }}</td>
                                <td :class="scoreTextClass(row.fund_score)">{{ row.fund_score }}</td>
                                <td :class="valClass(row.revenue_growth)">{{ row.revenue_growth != null ? fmtGrowth(row.revenue_growth) : '-' }}</td>
                                <td :class="valClass(row.net_profit_growth)">{{ row.net_profit_growth != null ? fmtGrowth(row.net_profit_growth) : '-' }}</td>
                                <td style="text-align:left;">
                                    <span v-for="t in (row.active_tags || []).slice(0, 4)" :key="t.id" class="screening-tag">{{ t.name }}</span>
                                    <span v-if="(row.active_tags || []).length > 4" class="screening-tag-more">+{{ row.active_tags.length - 4 }}</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" v-if="searchResult.total > searchResult.page_size">
                    <button class="page-btn" :disabled="searchResult.page <= 1" @click="searchResult.page--; doSearch()">‹</button>
                    <span class="page-info">{{ searchResult.page }} / {{ Math.ceil(searchResult.total / searchResult.page_size) }}</span>
                    <button class="page-btn" :disabled="searchResult.page * searchResult.page_size >= searchResult.total" @click="searchResult.page++; doSearch()">›</button>
                </div>
            </div>

            <div v-else-if="searchResult && !searchResult.rows.length" class="card">
                <div class="placeholder" style="height:100px;">
                    <p style="font-size:13px;color:var(--text-muted);">没有符合条件的股票，请调整筛选条件</p>
                </div>
            </div>

            <div v-if="!searchResult && !searchLoading" class="card">
                <div class="placeholder" style="height:100px;">
                    <p style="font-size:13px;color:var(--text-muted);">设置筛选条件后点击"执行筛选"</p>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- ── AI Debate Template ── -->
<template id="debate-tpl">
    <div class="topbar">
        <h2>AI多空辩论</h2>
        <span class="badge">实时分析</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="form-row">
                <div class="config-item" style="min-width:120px;">
                    <label>股票代码</label>
                    <input v-model="stockCode" placeholder="600519" @keyup.enter="startDebate" style="width:140px;">
                </div>
                <div class="config-item">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" @click="startDebate" :disabled="loading">
                        <span v-if="loading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                        {{ loading ? '辩论进行中...' : '⚖ 开始辩论' }}
                    </button>
                </div>
            </div>
        </div>

        <div v-if="error" class="card" style="border-color:var(--red);color:var(--red);font-size:13px;">
            {{ error }}
        </div>

        <template v-if="result">
            <div class="profile-header">
                <div class="profile-header-left">
                    <div class="profile-code">{{ result.stock_code }}</div>
                    <div class="profile-name">{{ result.stock_name }}</div>
                </div>
                <div class="profile-header-right">
                    <div class="profile-price">{{ fmt(result.price) }}</div>
                    <div class="profile-change" :class="valClass(result.change_pct)">{{ fmtGrowth(result.change_pct) }}</div>
                </div>
            </div>

            <div v-for="(round, i) in result.rounds" :key="i" class="debate-round" :class="'round-' + round.stance">
                <div class="debate-round-header">
                    <span class="debate-round-num">第{{ i + 1 }}轮</span>
                    <span class="debate-stance-tag" :class="'tag-' + round.stance">{{ round.stance === 'bullish' ? '看多' : round.stance === 'bearish' ? '看空' : '总结' }}</span>
                    <span class="debate-round-label">{{ round.role }}</span>
                </div>
                <div class="debate-bubble" :class="'debate-' + round.stance">
                    <div class="debate-speaker">
                        <span class="debate-avatar">{{ round.avatar }}</span>
                        <span class="debate-name" :class="'debate-name-' + round.stance">{{ round.speaker }}</span>
                        <span class="debate-role-label">{{ round.role }}</span>
                    </div>
                    <div class="debate-content" v-html="renderMarkdown(round.content)"></div>
                </div>
            </div>

            <div class="debate-disclaimer">{{ result.disclaimer }}</div>
        </template>
    </div>
</template>

<script src="https://unpkg.com/vue@3.4/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="app.js"></script>
</body>
</html>
