<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">AI<span>Trade</span></div>
        <nav>
            <a v-for="p in pages" :key="p.id"
               :class="{ active: currentPage === p.id }"
               @click="currentPage = p.id">
                <span class="icon">{{ p.icon }}</span>
                {{ p.label }}
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="main">
        <screening-page v-if="currentPage === 'screening'"></screening-page>
        <vcp-page v-else-if="currentPage === 'vcp'"></vcp-page>
        <position-bt-page v-else-if="currentPage === 'position_bt'"></position-bt-page>
        <ma-bt-page v-else-if="currentPage === 'ma_bt'"></ma-bt-page>
        <profile-page v-else-if="currentPage === 'profile'"></profile-page>
        <debate-page v-else-if="currentPage === 'debate'"></debate-page>
        <expert-page v-else-if="currentPage === 'expert'"></expert-page>
        <data-mgmt-page v-else-if="currentPage === 'data_mgmt'"></data-mgmt-page>
        <placeholder-page v-else :page="pages.find(p => p.id === currentPage)"></placeholder-page>
    </div>
</div>

<!-- Screening Template -->
<template id="screening-tpl">
    <div class="topbar">
        <h2>选股策略</h2>
        <span class="badge">智能筛选</span>
    </div>
    <div class="content">
        <!-- Error -->
        <div class="card" v-if="error" style="border-color:var(--red);color:var(--red);font-size:13px;">
            {{ error }}
        </div>

        <!-- Strategy Tabs -->
        <div class="strategy-tabs">
            <button class="strategy-tab" :class="{ active: tabType === 'technical' }"
                    @click="tabType = 'technical'; selectedStrategy = null; result = null">技术指标</button>
            <button class="strategy-tab" :class="{ active: tabType === 'fundamental' }"
                    @click="tabType = 'fundamental'; selectedStrategy = null; result = null">基本面指标</button>
            <button class="strategy-tab" :class="{ active: tabType === 'combined' }"
                    @click="tabType = 'combined'; selectedStrategy = null; result = null">组合筛选</button>
            <button class="strategy-tab tab-minervini" :class="{ active: tabType === 'minervini' }"
                    @click="tabType = 'minervini'; selectedStrategy = null; result = null"
                    style="color:var(--amber);">⚡ Minervini</button>
        </div>

        <div v-if="tabType === 'minervini'" class="card" style="border-color:var(--amber);font-size:13px;line-height:1.7;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <span style="font-size:20px;">⚡</span>
                <strong style="color:var(--amber);">Mark Minervini · SEPA 选股法</strong>
            </div>
            <p style="color:var(--text-muted);">
                <strong style="color:var(--text);">SEPA（Specific Entry Point Analysis）</strong> = 基本面 + 技术面双优筛选。
                Minervini 的「趋势模板」要求：EPS/营收增长 > 25%、ROE > 17%、
                价格在 MA50/MA150 上方、距 52 周高点的 75% 以内、近期波幅收敛、成交量放大确认。<br>
                <span style="color:var(--text-dim);font-size:12px;">参考: 《超级绩效》《股票魔法师》</span>
            </p>
        </div>

        <!-- Strategy Cards -->
        <div class="card" v-for="s in currentStrategies" :key="s.id"
             v-show="tabType !== 'fundamental' || s.id === 'fundamental_all'"
             :style="{ borderColor: isSelected(s.id) ? 'var(--accent)' : '' }">
            <div class="card-title">
                {{ s.name }}
                <span class="hint">{{ s.description }}</span>
            </div>
            <div v-if="tabType === 'technical' && s.id === 'ma_bullish'" class="config-grid">
                <div class="config-item">
                    <label>均线周期（逗号分隔）</label>
                    <input v-model="maPeriods" placeholder="5,10,20,60">
                </div>
            </div>
            <div v-if="tabType === 'fundamental' && s.id === 'fundamental_all'" class="config-grid">
                <div class="config-item">
                    <label>营收增长率下限 (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                </div>
                <div class="config-item">
                    <label>净利润增长率下限 (%)</label>
                    <input v-model.number="profitThreshold" type="number" step="1">
                </div>
                <div class="config-item">
                    <label>资产负债率上限 (%)</label>
                    <input v-model.number="debtThreshold" type="number" step="1">
                </div>
            </div>
            <div v-if="tabType === 'combined' && s.id === 'ma_bullish_and_revenue_growth'" class="config-grid">
                <div class="config-item">
                    <label>均线周期（逗号分隔）</label>
                    <input v-model="maPeriods" placeholder="5,10,20,60">
                </div>
                <div class="config-item">
                    <label>营收增长率下限 (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                </div>
            </div>
            <div v-if="tabType === 'minervini' && s.id === 'sepa_master'" class="config-grid">
                <div class="config-item">
                    <label>Minervini: 净利润增长率 ≥ (%)</label>
                    <input v-model.number="profitThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 25%+</span>
                </div>
                <div class="config-item">
                    <label>Minervini: 营收增长率 ≥ (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 25%+</span>
                </div>
                <div class="config-item">
                    <label>Minervini: ROE ≥ (%)</label>
                    <input v-model.number="debtThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 17%+</span>
                </div>
            </div>
            <div v-if="tabType === 'minervini' && s.id === 'minervini_trend_template'" class="config-grid">
                <div class="config-item">
                    <label>距52周高点 ≥ (%)</label>
                    <input v-model.number="revenueThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 75%+</span>
                </div>
                <div class="config-item">
                    <label>价格紧凑观察期 (天)</label>
                    <input v-model.number="profitThreshold" type="number" step="1">
                    <span class="hint">Minervini基准: 15-30天</span>
                </div>
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-primary" @click="selectStrategy(s.id)" :disabled="isSelected(s.id)">
                    {{ isSelected(s.id) ? '✓ 已选择' : '选择此策略' }}
                </button>
            </div>
        </div>

        <!-- Execute -->
        <div v-if="selectedStrategy" class="card" style="display:flex;align-items:center;gap:16px;">
            <span style="font-size:13px;color:var(--text-muted);">
                已选策略: <strong style="color:var(--accent);">{{ currentStrategies.find(s=>s.id===selectedStrategy)?.name || selectedStrategy }}</strong>
            </span>
            <button class="btn btn-primary" @click="execute" :disabled="loading">
                <span v-if="loading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                {{ loading ? '筛选中...' : '▶ 执行筛选' }}
            </button>
        </div>

        <!-- Results -->
        <div v-if="result" class="card">
            <div class="result-bar">
                <span class="count">共筛选出 <strong>{{ result.total }}</strong> 只股票</span>
            </div>
            <div class="table-wrap" v-if="result.rows && result.rows.length">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:40px;">#</th>
                                    <th style="width:80px;">代码</th>
                                    <th style="width:90px;">名称</th>
                                    <th v-for="col in result.columns" :key="col">
                                        <template v-if="col === 'close_price'">最新价</template>
                                        <template v-else-if="col === 'report_date'">报告期</template>
                                        <template v-else-if="col === 'latest_date'">最新日</template>
                                        <template v-else-if="col === 'revenue_growth_rate'">营收增长率</template>
                                        <template v-else-if="col === 'net_profit_growth_rate'">净利润增长率</template>
                                        <template v-else-if="col === 'debt_ratio'">资产负债率</template>
                                        <template v-else-if="col === 'roe'">ROE</template>
                                        <template v-else-if="col === 'q_revenue'">单季营业收入</template>
                                        <template v-else-if="col === 'q_parent_net_profit'">单季归母净利润</template>
                                        <template v-else-if="col === 'latest_price'">最新价</template>
                                        <template v-else-if="col === 'pct_52w_high'">距52周高</template>
                                        <template v-else-if="col === 'ma50'">MA50</template>
                                        <template v-else-if="col === 'ma150'">MA150</template>
                                        <template v-else-if="col === 'tightness'">波幅</template>
                                        <template v-else-if="col === 'volume_ratio'">量比</template>
                                        <template v-else>{{ col }}</template>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="(row, i) in result.rows" :key="i">
                                    <td>{{ i + 1 }}</td>
                                    <td><strong>{{ row.stock_code }}</strong></td>
                                    <td>{{ row.stock_name }}</td>
                                    <td v-for="col in result.columns" :key="col" :class="valClass(row[col])">
                                        <template v-if="col === 'close_price' || col === 'ma50' || col === 'ma150' || col === 'latest_price'">
                                            {{ fmt(row[col]) }}
                                        </template>
                                        <template v-else-if="col.startsWith('ma') && col !== 'ma50' && col !== 'ma150'">
                                            {{ fmt(row[col]) }}
                                        </template>
                                        <template v-else-if="col.includes('growth') || col.includes('ratio')">
                                            {{ fmtGrowth(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'roe'">
                                            {{ fmtGrowth(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'pct_52w_high'">
                                            {{ row[col] != null ? Number(row[col]).toFixed(1) + '%' : '-' }}
                                        </template>
                                        <template v-else-if="col === 'tightness'">
                                            {{ row[col] != null ? Number(row[col]).toFixed(2) + '%' : '-' }}
                                        </template>
                                        <template v-else-if="col === 'volume_ratio'">
                                            {{ row[col] != null ? Number(row[col]).toFixed(2) + 'x' : '-' }}
                                        </template>
                                        <template v-else-if="col === 'q_revenue' || col === 'q_parent_net_profit'">
                                            {{ fmtMoney(row[col]) }}
                                        </template>
                                        <template v-else-if="col === 'report_date' || col === 'latest_date'">
                                            {{ row[col] ? String(row[col]).substring(0, 10) : '' }}
                                        </template>
                                        <template v-else>
                                            {{ row[col] ?? '-' }}
                                        </template>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
            </div>
            <div v-else class="placeholder" style="height:100px;">
                <p style="font-size:13px;color:var(--text-muted);">没有符合条件的股票</p>
            </div>
        </div>
    </div>
</template>

<!-- ── Position Backtest Template ── -->
<template id="position-bt-tpl">
    <div class="topbar">
        <h2>建仓回测</h2>
        <span class="badge">交互式</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="form-row">
                <div class="config-item" style="min-width:100px;">
                    <label>股票代码</label>
                    <input v-model="stockCode" placeholder="600519" @keyup.enter="loadKline">
                </div>
                <div class="config-item" style="min-width:100px;">
                    <label>K线天数</label>
                    <input v-model.number="klineDays" type="number" min="60" max="2000">
                </div>
                <div class="config-item" style="min-width:100px;">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" @click="loadKline" :disabled="klineLoading">
                        {{ klineLoading ? '加载中...' : '加载K线' }}
                    </button>
                </div>
                <div v-if="stockName" class="config-item" style="justify-content:flex-end;">
                    <span style="font-size:16px;font-weight:700;color:var(--accent);">{{ stockCode }} {{ stockName }}</span>
                </div>
            </div>
        </div>

        <div v-if="chartData.length" class="trade-toggle">
            <button class="toggle-btn buy" :class="{ active: tradeDirection === 'buy' }" @click="tradeDirection='buy'">▲ 买入</button>
            <button class="toggle-btn sell" :class="{ active: tradeDirection === 'sell' }" @click="tradeDirection='sell'">▼ 卖出</button>
            <span style="font-size:12px;color:var(--text-muted);margin-left:12px;line-height:34px;">点击K线柱添加交易记录（每手100股）</span>
        </div>

        <div v-if="chartData.length" class="chart-box" ref="chartRef"></div>

        <div v-if="trades.length" class="card">
            <div class="card-title">交易记录 ({{ trades.length }})</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>日期</th><th>方向</th><th>股数</th><th>价格</th><th>金额</th><th>操作</th></tr></thead>
                    <tbody>
                        <tr v-for="(t, i) in trades" :key="i">
                            <td>{{ t.date }}</td>
                            <td><span :style="{color:t.direction==='buy'? 'var(--red)':'var(--green)'}">{{ t.direction==='buy' ? '买入' : '卖出' }}</span></td>
                            <td>{{ t.shares }}</td>
                            <td>{{ fmt(t.price) }}</td>
                            <td>{{ fmt(t.shares * t.price) }}</td>
                            <td><button class="btn-delete" @click="deleteTrade(i)">删除</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div v-if="trades.length" style="margin-top:12px;">
                <button class="btn btn-primary" @click="runPositionBt" :disabled="btLoading">
                    {{ btLoading ? '计算中...' : '▶ 计算回测结果' }}
                </button>
            </div>
        </div>

        <div v-if="btResult.summary && Object.keys(btResult.summary).length" class="card">
            <div class="card-title">持仓汇总</div>
            <div class="summary-grid">
                <div class="summary-item"><div class="label">已投入总金额</div><div class="value accent">{{ fmtMoney(btResult.summary.total_invested) }}</div></div>
                <div class="summary-item"><div class="label">当前持仓市值</div><div class="value accent">{{ fmtMoney(btResult.summary.final_market_value) }}</div></div>
                <div class="summary-item"><div class="label">已卖出金额</div><div class="value accent">{{ fmtMoney(btResult.summary.total_sold_value) }}</div></div>
                <div class="summary-item"><div class="label">盈亏金额</div><div class="value" :class="btResult.summary.total_pnl >= 0 ? 'green' : 'red'">{{ fmtMoney(btResult.summary.total_pnl) }}</div></div>
                <div class="summary-item"><div class="label">总收益率</div><div class="value" :class="btResult.summary.total_return >= 0 ? 'green' : 'red'">{{ btResult.summary.total_return }}%</div></div>
                <div class="summary-item"><div class="label">最大回撤</div><div class="value red">{{ btResult.summary.max_drawdown }}%</div></div>
                <div class="summary-item"><div class="label">持仓股数</div><div class="value accent">{{ btResult.summary.shares_held }}</div></div>
            </div>
        </div>

        <div v-if="paginatedPnl.length" class="card">
            <div class="card-title">逐日盈亏明细</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>日期</th><th>持仓</th><th>市值</th><th>累计盈亏</th></tr></thead>
                    <tbody>
                        <tr v-for="d in paginatedPnl" :key="d.date">
                            <td>{{ d.date }}</td>
                            <td>{{ d.shares_held }}</td>
                            <td>{{ fmtMoney(d.market_value) }}</td>
                            <td :style="{color:d.cumulative_pnl>=0?'var(--green)':'var(--red)'}">{{ fmtMoney(d.cumulative_pnl) }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <button class="page-btn" :disabled="pnlPage <= 1" @click="pnlPage--">‹</button>
                <span class="page-info">{{ pnlPage }} / {{ pnlTotalPages }}</span>
                <button class="page-btn" :disabled="pnlPage >= pnlTotalPages" @click="pnlPage++">›</button>
            </div>
        </div>
    </div>
</template>

<!-- ── MA Backtest Template ── -->
<template id="ma-bt-tpl">
    <div class="topbar">
        <h2>均线回测</h2>
        <span class="badge">MA策略</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="card-title">策略参数</div>
            <div class="form-row">
                <div class="config-item"><label>股票代码</label><input v-model="maStockCode" placeholder="600519" @keyup.enter="runMaBt"></div>
                <div class="config-item"><label>开始日期</label><input v-model="maStartDate" type="date"></div>
                <div class="config-item"><label>结束日期</label><input v-model="maEndDate" type="date"></div>
                <div class="config-item"><label>短期均线</label><input v-model.number="maShort" type="number" min="2" max="120"></div>
                <div class="config-item"><label>长期均线</label><input v-model.number="maLong" type="number" min="5" max="250"></div>
                <div class="config-item"><label>总资金</label><input v-model.number="maAmount" type="number" min="10000"></div>
                <div class="config-item"><label>&nbsp;</label><button class="btn btn-primary" @click="runMaBt" :disabled="maLoading">{{ maLoading ? '运行中...' : '▶ 运行回测' }}</button></div>
            </div>
            <div v-if="maResult.summary && Object.keys(maResult.summary).length" style="margin-top:8px;">
                <div class="summary-grid">
                    <div class="summary-item"><div class="label">总收益率</div><div class="value" :class="maResult.summary.total_return>=0?'green':'red'">{{ maResult.summary.total_return }}%</div></div>
                    <div class="summary-item"><div class="label">交易次数</div><div class="value accent">{{ maResult.summary.total_trades }}</div></div>
                    <div class="summary-item"><div class="label">胜率</div><div class="value accent">{{ maResult.summary.win_rate }}%</div></div>
                    <div class="summary-item"><div class="label">最大回撤</div><div class="value red">{{ maResult.summary.max_drawdown }}%</div></div>
                    <div class="summary-item"><div class="label">总盈亏</div><div class="value" :class="maResult.summary.total_pnl>=0?'green':'red'">{{ fmtMoney(maResult.summary.total_pnl) }}</div></div>
                    <div class="summary-item"><div class="label">剩余现金</div><div class="value accent">{{ fmtMoney(maResult.summary.final_cash) }}</div></div>
                    <div class="summary-item"><div class="label">持仓股数</div><div class="value accent">{{ maResult.summary.final_shares }}</div></div>
                </div>
            </div>
        </div>

        <div v-if="maResult.trades && maResult.trades.length" class="chart-box" ref="maChartRef"></div>

        <div v-if="maResult.trades && maResult.trades.length" class="card">
            <div class="card-title">交易明细 ({{ maResult.trades.length }})</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>买入日</th><th>买入价</th><th>卖出日</th><th>卖出价</th><th>股数</th><th>盈亏</th><th>收益率</th></tr></thead>
                    <tbody>
                        <tr v-for="t in maResult.trades" :key="t.entry_date">
                            <td>{{ t.entry_date }}</td><td>{{ fmt(t.entry_price) }}</td>
                            <td>{{ t.exit_date || '-' }}</td><td>{{ t.exit_price ? fmt(t.exit_price) : '-' }}</td>
                            <td>{{ t.shares }}</td>
                            <td :style="{color:(t.pnl||0)>=0?'var(--green)':'var(--red)'}">{{ t.pnl ? fmtMoney(t.pnl) : '-' }}</td>
                            <td :style="{color:(t.pnl_pct||0)>=0?'var(--green)':'var(--red)'}">{{ t.pnl_pct ? t.pnl_pct+'%' : '-' }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div v-if="maResult.daily && maResult.daily.length" class="card">
            <div class="card-title">逐日盈亏</div>
            <div class="table-wrap">
                        <table>
                            <thead><tr><th>日期</th><th>收盘价</th><th>状态</th><th>现金</th><th>持股</th><th>总资产</th><th>累计盈亏</th></tr></thead>
                            <tbody>
                                <tr v-for="d in maResult.daily" :key="d.date">
                                    <td>{{ d.date }}</td><td>{{ fmt(d.close_price) }}</td>
                                    <td>{{ d.in_position ? '持仓' : '空仓' }}</td>
                                    <td>{{ fmtMoney(d.cash) }}</td>
                                    <td>{{ d.shares_held }}</td>
                                    <td>{{ fmtMoney(d.portfolio) }}</td>
                                    <td :style="{color:d.cumulative_pnl>=0?'var(--green)':'var(--red)'}">{{ fmtMoney(d.cumulative_pnl) }}</td>
                                </tr>
                            </tbody>
                        </table>
            </div>
        </div>
    </div>
</template>

<!-- ── Profile Template ── -->
<template id="profile-tpl">
    <div class="topbar">
        <h2>股票画像</h2>
        <span class="badge" v-if="profileStatusData">{{ profileStatusData.latest_data_date || '未缓存' }}</span>
        <button v-if="activeTab === 'screening'" class="btn btn-outline btn-sm" style="margin-left:auto;" @click="triggerRefresh" :disabled="refreshing">
            <span v-if="refreshing" class="spinner" style="display:inline-block;width:12px;height:12px;border-width:2px;vertical-align:middle;margin-right:4px;"></span>
            {{ refreshing ? refreshProgress : '⟳ 刷新缓存' }}
        </button>
        <span v-if="refreshToast" style="margin-left:12px;color:#22c55e;font-size:13px;">{{ refreshToast }}</span>
    </div>
    <div class="profile-tabs">
        <button :class="{ active: activeTab === 'single' }" @click="activeTab = 'single'">单股画像</button>
        <button :class="{ active: activeTab === 'screening' }" @click="activeTab = 'screening'">画像筛选</button>
    </div>
    <div class="content">
        <!-- ══════ Tab1: 单股画像 ══════ -->
        <div v-if="activeTab === 'single'">

                                <td>{{ row.stock_name }}</td>
                                <td>{{ fmt(row.latest_price) }}</td>
                                <td :class="valClass(row.price_change_pct)">{{ fmtGrowth(row.price_change_pct) }}</td>

<template id="vcp-tpl">
    <div class="topbar">
        <h2>VCP 波动收缩扫描</h2>
        <span class="badge">Minervini</span>
    </div>
    <div class="content">
        <div class="card" style="border-color:var(--amber);font-size:13px;line-height:1.7;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                <span style="font-size:18px;">◐</span>
                <strong style="color:var(--amber);">Volatility Contraction Pattern · 波动收缩形态</strong>
            </div>
            <p style="color:var(--text-muted);margin:0;">
                VCP 是 <strong style="color:var(--text);">Mark Minervini</strong> 选股方法的核心形态：
                股票经历 2-6 次价格收缩（T1→T2→T3…），每次收缩幅度递减、成交量逐步萎缩，
                最后在极度紧凑的价格区间内<strong style="color:var(--green);">放量突破</strong>。
            </p>
        </div>

        <div class="card">
            <div class="config-grid">
                <div class="config-item">
                    <label>最少收缩次数</label>
                    <input v-model.number="minContractions" type="number" min="1" max="6" step="1">
                </div>
                <div class="config-item">
                    <label>最多收缩次数</label>
                    <input v-model.number="maxContractions" type="number" min="2" max="10" step="1">
                </div>
                <div class="config-item">
                    <label>单次最小收缩幅度 (%)</label>
                    <input v-model.number="minPct" type="number" min="1" max="20" step="0.5">
                </div>
                <div class="config-item">
                    <label>回溯天数</label>
                    <input v-model.number="lookbackDays" type="number" min="60" max="365" step="10">
                </div>
                <div class="config-item" style="justify-content:flex-end;">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" @click="scan" :disabled="loading">
                        <span v-if="loading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                        {{ loading ? '扫描中...' : '◐ 扫描 VCP' }}
                    </button>
                </div>
            </div>
            <div v-if="scanTime" style="font-size:12px;color:var(--text-dim);margin-top:8px;">
                扫描用时 {{ scanTime }} 秒 · 全市场扫描 {{ scannedCount }} 只
            </div>
        </div>

        <div v-if="result && result.total > 0" class="card">
            <div class="result-bar">
                <span class="count">检测到 <strong>{{ result.total }}</strong> 只 VCP 形态股
                    <span v-if="result.total <= 10" style="color:var(--amber);margin-left:8px;">| 收缩数越多 · 信号越强</span>
                </span>
                <div class="vcp-legend">
                    <span class="vcp-legend-dot" style="background:var(--green);"></span> 突破信号
                    <span class="vcp-legend-dot" style="background:var(--amber);margin-left:12px;"></span> 近轴心
                    <span class="vcp-legend-dot" style="background:var(--text-dim);margin-left:12px;"></span> 收缩中
                </div>
            </div>
        </div>

        <div v-if="result && result.rows.length" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;">
            <div v-for="(stock, si) in result.rows" :key="stock.stock_code"
                 class="card vcp-stock-card"
                 :class="{'vcp-breakout': stock.breakout_signal, 'vcp-near-pivot': stock.near_pivot}">
                <div class="vcp-card-header">
                    <div>
                        <strong class="vcp-code">{{ stock.stock_code }}</strong>
                        <span class="vcp-name">{{ stock.stock_name }}</span>
                    </div>
                    <div class="vcp-price-section">
                        <span class="vcp-price">{{ fmt(stock.latest_price) }}</span>
                        <span v-if="stock.breakout_signal" class="vcp-badge vcp-badge-breakout">🚀 突破</span>
                        <span v-else-if="stock.near_pivot" class="vcp-badge vcp-badge-ready">⚡ 临近</span>
                        <span v-else class="vcp-badge vcp-badge-building">◐ 构建中</span>
                    </div>
                </div>

                <div class="vcp-timeline">
                    <div v-for="(c, ci) in stock.contractions" :key="ci" class="vcp-tick"
                         :class="{'vcp-tick-last': ci === stock.contractions.length - 1}">
                        <div class="vcp-tick-label">{{ c.label }}</div>
                        <div class="vcp-tick-bar-wrap">
                            <div class="vcp-tick-bar" :style="{height: c.decline_pct * 3 + 'px', opacity: 1 - ci * 0.15}"></div>
                        </div>
                        <div class="vcp-tick-decline">{{ c.decline_pct }}%</div>
                        <div v-if="c.is_complete === false" class="vcp-tick-pending">进行中</div>
                    </div>
                </div>

                <div class="vcp-metrics">
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">收缩次数</span>
                        <span class="vcp-metric-val">{{ stock.contraction_count }}T</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">轴心价</span>
                        <span class="vcp-metric-val">{{ fmt(stock.pivot_price) }}</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">距轴心</span>
                        <span class="vcp-metric-val" :class="stock.distance_from_pivot_pct > 0 ? 'up' : 'down'">{{ stock.distance_from_pivot_pct > 0 ? '+' : '' }}{{ stock.distance_from_pivot_pct }}%</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">20日波幅</span>
                        <span class="vcp-metric-val">{{ stock.current_tightness }}%</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">量比(10/50)</span>
                        <span class="vcp-metric-val" :class="stock.volume_dry_up ? 'down' : 'accent'">{{ stock.volume_ratio }}x</span>
                    </div>
                    <div class="vcp-metric">
                        <span class="vcp-metric-label">MA50/MA150</span>
                        <span class="vcp-metric-val" style="font-size:11px;">{{ stock.ma50_ma150 || '-' }}</span>
                    </div>
                </div>

                <div class="vcp-volume-row">
                    <span class="vcp-volume-label">量能:</span>
                    <span v-if="stock.volume_dry_up" class="vcp-volume-dry">缩量 ✓</span>
                    <span v-if="stock.volume_surge" class="vcp-volume-surge">放量 💥</span>
                    <span v-else-if="!stock.volume_dry_up && !stock.volume_surge" class="vcp-volume-normal">正常</span>
                    <span class="vcp-volume-date" style="margin-left:auto;font-size:11px;">{{ stock.latest_date }}</span>
                </div>
            </div>

            <div v-if="!result.rows.length && !loading" class="card">
                <div class="placeholder" style="height:100px;">
                    <p>未检测到 VCP 形态，请调整参数</p>
                </div>
            </div>
        </div>
    </div>
</template>

<template id="expert-tpl">
    <div class="topbar">
        <h2>蒸馏专家</h2>
        <span class="badge" v-if="expertName">{{ expertName }}</span>
    </div>
    <div class="content expert-layout">
        <div class="expert-sidebar">
            <div class="card" style="margin-bottom:12px;">
                <div class="card-title" style="font-size:13px;">选择专家</div>
                <div class="expert-select-wrap">
                    <select v-model="selectedExpert" @change="switchExpert" class="expert-select">
                        <option value="" disabled>请选择思维框架...</option>
                        <option v-for="e in experts" :key="e.id" :value="e.id">
                            {{ e.name }}
                        </option>
                    </select>
                </div>
                <div v-if="expertDesc" class="expert-desc">
                    <div class="expert-desc-text">{{ expertDesc }}</div>
                </div>
            </div>

            <div class="card" style="margin-bottom:12px;">
                <div class="card-title" style="font-size:13px;">当前股票数据</div>
                <div v-if="stockData">
                    <div class="expert-data-row"><span>代码</span><span>{{ stockData.stock_code }}</span></div>
                    <div class="expert-data-row"><span>名称</span><span>{{ stockData.stock_name }}</span></div>
                    <div class="expert-data-row"><span>最新价</span><span class="accent">{{ fmt(stockData.price) }}</span></div>
                    <div class="expert-data-row"><span>MA50</span><span>{{ stockData.ma50 != null ? fmt(stockData.ma50) : '-' }}</span></div>
                    <div class="expert-data-row"><span>距52周高</span><span>{{ stockData.pct_52w != null ? stockData.pct_52w + '%' : '-' }}</span></div>
                    <div v-if="finData" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;">
                        <div class="expert-data-row"><span>营收增长</span><span :class="finClass(finData.revenue_growth)">{{ finData.revenue_growth != null ? fmtGrowth(finData.revenue_growth) : '-' }}</span></div>
                        <div class="expert-data-row"><span>利润增长</span><span :class="finClass(finData.profit_growth)">{{ finData.profit_growth != null ? fmtGrowth(finData.profit_growth) : '-' }}</span></div>
                        <div class="expert-data-row"><span>ROE</span><span class="accent">{{ finData.roe != null ? finData.roe + '%' : '-' }}</span></div>
                        <div class="expert-data-row"><span>负债率</span><span>{{ finData.debt_ratio != null ? finData.debt_ratio + '%' : '-' }}</span></div>
                    </div>
                </div>
                <div v-else class="expert-data-empty">输入股票代码后显示</div>
            </div>

            <div v-if="availableExperts.length > 1" class="card" style="padding:12px;">
                <div style="font-size:12px;color:var(--text-dim);">已安装 {{ availableExperts.length }} 个专家技能</div>
            </div>
        </div>

        <div class="expert-main">
            <div class="card" style="margin-bottom:12px;">
                <div class="form-row" style="gap:8px;">
                    <div class="config-item" style="min-width:100px;flex:0 0 100px;">
                        <label>股票代码</label>
                        <input v-model="stockCode" placeholder="600519" @keyup.enter="send" style="width:100%;">
                    </div>
                    <div class="config-item" style="flex:1;">
                        <label>你想问什么？</label>
                        <div style="display:flex;gap:8px;">
                            <input v-model="question" placeholder="例如：这只股票值得买入吗？" @keyup.enter="send" style="flex:1;">
                            <button class="btn btn-primary" @click="send" :disabled="loading || !selectedExpert" style="white-space:nowrap;">
                                <span v-if="loading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:4px;"></span>
                                {{ loading ? '思考中...' : '发送' }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="error" class="card" style="border-color:var(--red);color:var(--red);font-size:13px;margin-bottom:12px;">
                {{ error }}
            </div>

            <div class="card expert-chat-card">
                <div v-if="!messages.length" class="expert-welcome">
                    <div style="font-size:36px;margin-bottom:12px;">⚗</div>
                    <div style="font-size:15px;font-weight:600;color:var(--text);">蒸馏专家</div>
                    <div style="font-size:13px;color:var(--text-muted);margin-top:6px;">
                        选择一个思维框架，输入股票代码和问题，开始对话
                    </div>
                </div>

                <div v-for="(msg, i) in messages" :key="i" class="expert-msg" :class="'msg-' + msg.role">
                    <div class="expert-msg-avatar">
                        <span v-if="msg.role === 'expert'">🧠</span>
                        <span v-else>👤</span>
                    </div>
                    <div class="expert-msg-bubble" :class="'bubble-' + msg.role">
                        <div class="expert-msg-name">{{ msg.role === 'expert' ? expertName || '专家' : '我' }}</div>
                        <div class="expert-msg-content" v-html="renderMarkdown(msg.content)"></div>
                        <div v-if="msg.typing" class="typing-dots"><span></span><span></span><span></span></div>
                    </div>
                </div>

                <div ref="chatBottom" style="height:1px;"></div>
            </div>
        </div>
    </div>
</template>

<!-- ── AI Debate Template ── -->
<template id="debate-tpl">
    <div class="topbar">
        <h2>AI多空辩论</h2>
        <span class="badge">实时分析</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="form-row">
                <div class="config-item" style="min-width:120px;">
                    <label>股票代码</label>
                    <input v-model="stockCode" placeholder="600519" @keyup.enter="startDebate" style="width:140px;">
                </div>
                <div class="config-item">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" @click="startDebate" :disabled="loading">
                        <span v-if="loading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                        {{ loading ? '辩论进行中...' : '⚖ 开始辩论' }}
                    </button>
                </div>
            </div>
        </div>

        <div v-if="error" class="card" style="border-color:var(--red);color:var(--red);font-size:13px;">
            {{ error }}
        </div>

        <template v-if="result">
            <div class="profile-header">
                <div class="profile-header-left">
                    <div class="profile-code">{{ result.stock_code }}</div>
                    <div class="profile-name">{{ result.stock_name }}</div>
                </div>
                <div class="profile-header-right">
                    <div class="profile-price">{{ fmt(result.price) }}</div>
                    <div class="profile-change" :class="valClass(result.change_pct)">{{ fmtGrowth(result.change_pct) }}</div>
                </div>
            </div>

            <div v-for="(round, i) in result.rounds" :key="i" class="debate-round" :class="'round-' + round.stance">
                <div class="debate-round-header">
                    <span class="debate-round-num">第{{ i + 1 }}轮</span>
                    <span class="debate-stance-tag" :class="'tag-' + round.stance">{{ round.stance === 'bullish' ? '看多' : round.stance === 'bearish' ? '看空' : '总结' }}</span>
                    <span class="debate-round-label">{{ round.role }}</span>
                </div>
                <div class="debate-bubble" :class="'debate-' + round.stance">
                    <div class="debate-speaker">
                        <span class="debate-avatar">{{ round.avatar }}</span>
                        <span class="debate-name" :class="'debate-name-' + round.stance">{{ round.speaker }}</span>
                        <span class="debate-role-label">{{ round.role }}</span>
                    </div>
                    <div class="debate-content" v-html="renderMarkdown(round.content)"></div>
                </div>
            </div>

            <div class="debate-disclaimer">{{ result.disclaimer }}</div>
        </template>
    </div>
</template>

<!-- ── Data Management Template ── -->
<template id="data-mgmt-tpl">
    <div class="topbar">
        <h2>数据管理</h2>
        <span class="badge">数据中心</span>
        <button class="btn btn-outline btn-sm" style="margin-left:auto;" @click="loadStatus" :title="'刷新状态'">
            ⟳ 刷新
        </button>
    </div>
    <div class="content dm-page">
        <!-- Summary Strip -->
        <div class="dm-strip">
            <div class="dm-strip-item">
                <span class="dm-strip-icon">📅</span>
                <div>
                    <div class="dm-strip-val">{{ status.kline?.latest_date || '-' }}</div>
                    <div class="dm-strip-label">最新K线日期</div>
                </div>
            </div>
            <div class="dm-strip-item">
                <span class="dm-strip-icon">📊</span>
                <div>
                    <div class="dm-strip-val">{{ status.kline?.stock_count || 0 }}</div>
                    <div class="dm-strip-label">K线覆盖股票</div>
                </div>
            </div>
            <div class="dm-strip-item">
                <span class="dm-strip-icon">⏱</span>
                <div>
                    <div class="dm-strip-val">{{ lastSyncLabel }}</div>
                    <div class="dm-strip-label">上次同步</div>
                </div>
            </div>
        </div>

        <!-- Data Source Cards -->
        <div class="dm-grid">
            <!-- Kline Card -->
            <div class="dm-card dm-card-kline">
                <div class="dm-card-header">
                    <div class="dm-card-icon-wrap" style="background:rgba(0,212,255,0.12);">
                        <span style="font-size:22px;">📈</span>
                    </div>
                    <div class="dm-card-meta">
                        <div class="dm-card-title">日K线行情</div>
                        <div class="dm-card-subtitle">{{ status.kline?.stock_count || 0 }} 只股票 · 10M+ 记录</div>
                    </div>
                    <div class="dm-card-status">
                        <span class="dm-dot dm-dot-online"></span>
                        <span class="dm-status-text">已连接</span>
                    </div>
                </div>
                <div class="dm-card-body">
                    <div class="dm-info-row">
                        <span>数据来源</span>
                        <span class="dm-val">通达信 .day 文件</span>
                    </div>
                    <div class="dm-info-row">
                        <span>最新交易日期</span>
                        <span class="dm-val accent">{{ status.kline?.latest_date || '-' }}</span>
                    </div>
                    <div class="dm-info-row">
                        <span>数据量</span>
                        <span class="dm-val">{{ status.kline?.stock_count || 0 }} 只股票</span>
                    </div>
                    <div class="dm-info-row">
                        <span>更新方式</span>
                        <span class="dm-val">INSERT IGNORE 增量补全</span>
                    </div>
                </div>
                <div class="dm-card-footer">
                    <button class="btn btn-primary" @click="updateKline" :disabled="klineLoading">
                        <span v-if="klineLoading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                        {{ klineLoading ? '更新中...' : '⟳ 更新日K线' }}
                    </button>
                    <span v-if="klineResult" class="dm-toast dm-toast-ok">✓ {{ klineResult }}</span>
                    <span v-if="klineError" class="dm-toast dm-toast-err">✗ {{ klineError }}</span>
                </div>
            </div>

            <!-- Financial Card -->
            <div class="dm-card dm-card-fin">
                <div class="dm-card-header">
                    <div class="dm-card-icon-wrap" style="background:rgba(16,185,129,0.12);">
                        <span style="font-size:22px;">📋</span>
                    </div>
                    <div class="dm-card-meta">
                        <div class="dm-card-title">财务数据</div>
                        <div class="dm-card-subtitle">利润表 · 资产负债表 · 现金流</div>
                    </div>
                    <div class="dm-card-status">
                        <span class="dm-dot" :class="finDotClass"></span>
                        <span class="dm-status-text">{{ finStatusText }}</span>
                    </div>
                </div>
                <div class="dm-card-body">
                    <div class="dm-info-row">
                        <span>数据来源</span>
                        <span class="dm-val">通达信 GPCW 数据</span>
                    </div>
                    <div class="dm-info-row">
                        <span>最新报告期</span>
                        <span class="dm-val accent">{{ status.financial?.latest_date || '-' }}</span>
                    </div>
                    <div class="dm-info-row">
                        <span>记录数</span>
                        <span class="dm-val">{{ status.financial?.record_count || 0 }}</span>
                    </div>
                    <div class="dm-info-row">
                        <span>覆盖表</span>
                        <span class="dm-val">8 张财务表</span>
                    </div>
                </div>
                <div class="dm-card-footer">
                    <button class="btn btn-primary" style="background:var(--green);border-color:var(--green);" @click="updateFinancial" :disabled="finLoading">
                        <span v-if="finLoading" class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px;vertical-align:middle;margin-right:6px;"></span>
                        {{ finLoading ? '同步中...' : '⟳ 同步财务数据' }}
                    </button>
                    <span v-if="finResult" class="dm-toast dm-toast-ok">✓ {{ finResult }}</span>
                    <span v-if="finError" class="dm-toast dm-toast-err">✗ {{ finError }}</span>
                </div>
            </div>

            <!-- Sector Card -->
            <div class="dm-card dm-card-sector">
                <div class="dm-card-header">
                    <div class="dm-card-icon-wrap" style="background:rgba(245,158,11,0.12);">
                        <span style="font-size:22px;">🏷</span>
                    </div>
                    <div class="dm-card-meta">
                        <div class="dm-card-title">板块分类</div>
                        <div class="dm-card-subtitle">行业板块 · 概念板块 · 地域板块</div>
                    </div>
                    <div class="dm-card-status">
                        <span class="dm-dot dm-dot-pending"></span>
                        <span class="dm-status-text">待接入</span>
                    </div>
                </div>
                <div class="dm-card-body">
                    <div class="dm-info-row">
                        <span>数据来源</span>
                        <span class="dm-val">通达信板块数据</span>
                    </div>
                    <div class="dm-info-row">
                        <span>分类类型</span>
                        <span class="dm-val">行业 · 概念 · 地域</span>
                    </div>
                    <div class="dm-info-row">
                        <span>同步状态</span>
                        <span class="dm-val pending">{{ status.sector?.message || '未接入' }}</span>
                    </div>
                </div>
                <div class="dm-card-footer">
                    <button class="btn btn-outline" disabled>
                        <span style="opacity:0.5;">同步板块分类 · 待开发</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>

<script src="https://unpkg.com/vue@3.4/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="app.js"></script>
</body>
</html>
